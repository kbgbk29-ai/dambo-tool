<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>담보 비교</title>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

<div
  style={{
    background: "#FFF",
    border: "1.5px solid #E5E7EB",
    borderRadius: 10,
    padding: "10px 14px",
    marginBottom: 12,
    display: "flex",
    flexDirection: "column",
    alignItems: "stretch",
    gap: 10
  }}
>
  {[["A", selA, "#1D4ED8", "#DBEAFE"], ["B", selB, "#DC2626", "#FEE2E2"]].map(([lbl, sel, tc, bg], idx) => (
    <>

      {/* A 카드 */}
      {idx === 0 && (
        <div key={lbl} style={{ display: "flex", alignItems: "center", gap: 7, width: "100%" }}>
          <div style={{ background: bg, color: tc, borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700 }}>
            {lbl}
          </div>
          <div style={{ fontWeight: 600, fontSize: 13, color: sel ? "#111827" : "#D1D5DB", lineHeight: 1.3 }}>
            {sel ? (
              <>
                {sel.name}
                <br />
                <span style={{ fontWeight: 400, fontSize: 11, color: "#6B7280" }}>{sel.sub}</span>
              </>
            ) : (
              "담보를 선택하세요"
            )}
          </div>
        </div>
      )}

      {/* VS (토스 스타일) */}
      {idx === 1 && (
        <>
          <div style={{
            display:"flex",
            alignItems:"center",
            gap:8,
            margin:"4px 0",
            color:"#9CA3AF"
          }}>
            <div style={{flex:1,height:1,background:"#E5E7EB"}}/>
            <span style={{fontSize:12,fontWeight:700}}>VS</span>
            <div style={{flex:1,height:1,background:"#E5E7EB"}}/>
          </div>

          {/* B 카드 */}
          <div key={lbl} style={{ display: "flex", alignItems: "center", gap: 7, width: "100%" }}>
            <div style={{ background: bg, color: tc, borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700 }}>
              {lbl}
            </div>
            <div style={{ fontWeight: 600, fontSize: 13, color: sel ? "#111827" : "#D1D5DB", lineHeight: 1.3 }}>
              {sel ? (
                <>
                  {sel.name}
                  <br />
                  <span style={{ fontWeight: 400, fontSize: 11, color: "#6B7280" }}>{sel.sub}</span>
                </>
              ) : (
                "담보를 선택하세요"
              )}
            </div>
          </div>
        </>
      )}

    </>
  ))}

  {/* 버튼 영역 */}
  <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
    {(selA || selB) && (
      <button
        onClick={() => {
          setSelA(null);
          setSelB(null);
          setResult("");
          setError("");
        }}
        style={{
          background: "none",
          border: "1.5px solid #E5E7EB",
          borderRadius: 7,
          padding: "7px 12px",
          fontSize: 12,
          color: "#6B7280",
          cursor: "pointer"
        }}
      >
        초기화
      </button>
    )}

    <button
      onClick={compare}
      disabled={!selA || !selB || loading}
      style={{
        background: (!selA || !selB || loading)
          ? "#E5E7EB"
          : `linear-gradient(135deg,${cc},${cc}CC)`,
        color: (!selA || !selB || loading) ? "#9CA3AF" : "#FFF",
        border: "none",
        borderRadius: 7,
        padding: "8px 18px",
        fontSize: 13,
        fontWeight: 700,
        cursor: (!selA || !selB || loading) ? "default" : "pointer",
        display: "flex",
        alignItems: "center",
        gap: 6
      }}
    >
      {loading ? (
        <>
          <span
            style={{
              width: 13,
              height: 13,
              border: "2px solid #D1D5DB",
              borderTopColor: "#6B7280",
              borderRadius: "50%",
              display: "inline-block",
              animation: "spin .8s linear infinite"
            }}
          />
          분석 중
        </>
      ) : (
        "🔍 비교분석"
      )}
    </button>
  </div>
</div>

</script>

</body>
</html>
