······························ 586\n 아나필락시스쇼크진단비(갱신형) 특별약관 ·············································· 603 약제내성결핵(슈퍼결핵 포함)진단비(비갱신형/갱신형) 특별약관 ················ 273\n 아토피진단비(중증)(비갱신형) 특별약관 ··················································· 249 양성뇌종양진단비(비갱신형/갱신형) 특별약관 ·········································· 247\n 암수술비(유사암 제외)(비갱신형/갱신형) 특별약관 ··································· 296 양수과다증진단비(일시납/전기납) 특별약관 ············································ 1051\n 암입원일당Ⅱ(요양병원)(1일이상90일한도)(비갱신형/갱신형) 특별약관 ······ 227 양수과소증진단비(일시납/전기납) 특별약관 ············································ 1052"}, {"id": "c05", "name": "암진단비Ⅳ", "sub": "소액암 제외", "text": "76 암진단비Ⅳ(소액암제외)(맞춤간편고지)(비갱신형/갱신형) 암(소액암제외) 보장개시일\n 특별약관 예시 - 비갱신형 및 갱신형 (최초계약 )의 경우\n 계약일 보장개시일\n1. (보험금의 지급사유)\n• 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일 90일\n (책임개시일) 이후에 암(소액암제외)으로 진단확정된 경우 1회에 한하여 이 특별\n 약관에 따라 다음의 금액을 지급합니다.\n ① 비갱신형 및 갱신형(최초계약)의 경우 2024.4.10 2024.7.9\n\n 구분 지급금액\n 2. (보험금 지급에 관한 세부규정)\n 경과기간 지급금액\n 보험수익자와 회사가 1. (보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n 보험계약일로부터 이 특별약관 보험가입금액의\n 암진단비Ⅳ(소액암제외) 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있\n 1년미만 50%\n (1회한) 습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하\n 보험계약일로부터 이 특별약관 보험가입금액의\n 며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n 1년이상 100%\n 3. (“암(소액암제외)” 등의 정의 및 진단확정)\n ② 갱신형(갱신계약)의 경우\n • 이 특별약관에서 “암(소액암제외)”이라 함은 •에서 정한 “암”에서 •에서 정한 “기\n 구분 지급금액 타피부암”, 숗에서 정한 “갑상선암” 및 수에서 정한 “소액암”을 제외한 질병을 말합\n 니다.\n 암진단비Ⅳ(소액암제외)(1회한) 이 특별약관 보험가입금액의 100% • 이 특별약관에 있어서 “암”이라 함은 「악성신생물(암) 분류표」(【별표7】 악성신생물\n (암) 분류표 참조)에서 정한 질병을 말합니다. 다만, 전암(前癌)상태(암으로 변하기\n 이전 상태, premalignant condition or condition with malignant potential)에\n• 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다. 해당하는 질병은 제외합니다.\n • 이 특별약관에서 “기타피부암”이라 함은 「기타피부암 및 갑상선암 분류표」(【별표8】기\n 구분 보장개시일(책임개시일) 타피부암 및 갑상선암 분류표 참조) 중 분류번호 C44에 해당하는 질병을 말합니\n 다.\n 보험계약일로부터 그날을 포함하여 숗 이 특별약관에서 “갑상선암”이라 함은 「기타피부암 및 갑상선암 분류표」(【별표8】\n 비갱신형 및 갱신형(최초계약)의 경우 기타피부암 및 갑상선암 분류표 참조) 중 분류번호 C73에 해당하는 질병을 말\n 90일이 지난 날의 다음 날\n 합니다.\n 수 이 특별약관에서 “소액암”이라 함은 「소액암 분류표」(【별표67】소액암 분류표 참\n 갱신형(갱신계약)의 경우 이 특별약관의 갱신일\n 조)에서 정한 암을 말합니다.\n 숙 “암(소액암제외)”의 진단확정은 병리 또는 진단검사의학의 전문의사 자격증을 가\n 진 자에 의하여 내려져야 하며, 이 진단은 조직(fixed tissue)검사, 미세바늘흡\n\n 368\n\f☞ 목차로 돌아가기 무배당 프로미라이프 나에게 맞춘 간편건강보험2604\n 특\n 전일 이전에 암(소액암제외)으로 진단확정되는 경우에는 이 특별약관은 무효로 하며, 이미 납 별\n 유의사항 입한 보험료를 돌려드립니다. 약\n 관\n보험 한국표준질병·사인분류 지침서의 \"사망 및 질병이환의 분류번호부여를 위한\n지식 선정준칙과 지침\"에 따라 C77~C80(이차성 및 상세불명 부위의 악성신생 5. (보험료의 납입을 연체하여 해지된 계약의 부활(효력회복))\n 물(암))의 경우 일차성 악성신생물(암)이 확인되는 경우에는 원발부위(최초 부활(효력회복)되는 계약의 보장개시는 보통약관 29. (보험료의 납입을 연체하여 해지된 계약\n 발생한 부위)를 기준으로 분류합니다. 다만, 이 경우에도 원발부위의 암이 의 부활(효력회복))을 따릅니다. 단, 암(소액암제외)에 대한 보장개시일(책임개시일)은 부활(효\n 완치되었다면 이차성 및 상세불명 부위의 악성신생물(암)(C77-C80)의 진 력회복)을 청약한 날로부터 그날을 포함하여 90일이 지난 날의 다음"}]}, {"id": "g02", "label": "특정·고액·계속 암진단비", "icon": "🎯", "category": "암 진단", "tip": "일반 암진단비와 달리 특정 암 종류만 보장하거나, 재진단 시에도 계속 지급되는 특수 구조임.", "coverages": [{"id": "c06", "name": "고액치료비암진단비", "sub": "고액 치료 암만 별도 보장", "text": "12 고액치료비암진단비(비갱신형/갱신형) 특별약관\n피보험자가 이 특별약관의 보험계약일로부터 11대특정암에 대한 보장개시일(책임개시\n일)의 전일 이전에 11대특정암으로 진단확정되어 있는 경우에는 이 특별약관은 무효\n로 하며, 이미 납입한 보험료를 돌려드립니다.\n 1. (보험금의 지급사유)\n5. (보험료의 납입을 연체하여 해지된 계약의 부활(효력회복)) • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일\n부활(효력회복)되는 계약의 보장개시는 보통약관 29.(보험료의 납입을 연체하여 해지 (책임개시일) 이후에 고액치료비암으로 진단확정된 경우에는 1회에 한하여 이 특\n된 계약의 부활(효력회복))을 따릅니다. 단, 피보험자가 부활(효력회복)시 15세이상인 별약관의 보험가입금액을 고액치료비암진단비로 지급합니다.\n경우 보장개시일(책임개시일)은 부활(효력회복)일로부터 그날을 포함하여 90일이 지 • 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다.\n난날의 다음날입니다. 구분 보장개시일(책임개시일)\n\n6. (특별약관의 소멸) 비갱신형 및 보험계약일로부터 그 날을 포함하여 90일이 지난날의 다음날\n• 회사가 1.(보험금의 지급사유) •에서 정한 11대특정암진단비를 지급한 경우에 갱신형(최초계약) 단, 피보험자가 15세미만인 경우 제1회 보험료를 받은 때\n 그 손해보장의 원인이 생긴 때로부터 이 특별약관은 소멸됩니다.\n 갱신형(갱신계약) 이 특별약관의 갱신일\n• 위 •에 따라 이 특별약관이 소멸되는 경우에 회사는 해약환급금을 지급하지 않습니다.\n• 위 • 이외의 원인으로 이 특별약관이 소멸되는 경우 “보험료 및 해약환급금 산 고액치료비암 보장개시일\n 출방법서”에서 정하는 바에 따라 회사가 그 때까지 적립한 계약자적립액 및 미경\n 과보험료를 지급합니다. 예시 - 비갱신형 및 갱신형(최초계약)의 경우(피보험자가 15세이상인 경우)\n 계약일 보장개시일\n7. (특별약관의 갱신)\n이 특별약관을 갱신형으로 가입한 경우에는 『제도성 특별약관 [10.갱신형 계약 자동 90일\n갱신 특별약관]』에 따라 갱신됩니다.\n\n8. (준용규정) 2020.4.10 2020.7.9\n이 특별약관에 정하지 않은 사항은 보통약관을 따릅니다. 단, 이 특별약관에서는 보\n통약관에서 정한 9.(만기환급금의 지급)의 만기환급금 및 37.(중도인출금)의 중도인출 • 위 •에도 불구하고 연장계약의 보장개시일(책임개시일)은 연장일로 합니다.\n금은 지급하지 않으며, 보통약관 5.(보험금을 지급하지 않는 사유) • 및 15.(계약\n후 알릴 의무)는 적용하지 않습니다. 또한 4종을 제외한 갱신형에 한하여 보통약관 2. (보험금 지급에 관한 세부규정)\n26-1.(보험료 납입면제)는 적용하지 않습니다. 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있\n 습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하\n 며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n\n 216\n\f☞ 목차로 돌아가기 무배당 프로미라이프 아이(I)러브(LOVE)플러스건강보험2604\n 특\n3. (“고액치료비암”의 정의 및 진단확정) 4. (특별약관의 무효) 별\n 약\n• 이 특별약관에서󰡒고액치료비암󰡓이라 함은 「고액치료비암분류표」(【별표25】고액치 피보험자가 이 특별약관의 보험계약일로부터 고액치료비암에 대한 보장개시일(책임개\n 관\n 료비암분류표 참조)에서 정한 식도의 악성신생물(암)/췌장의 악성신생물(암)/골 및 시일)의 전일 이전에 고액치료비암으로 진단확정되어 있는 경우에는 이 특별약관은\n 관절연골의 악성신생물(암)/ 뇌 및 중추신경계통의 기타부분의 악성신생물(암)/ 림 무효로 하며, 이미 납입한 보험료를 돌려드립니다.\n 프, 조혈 및 관련조직의 악성신생물(암)을 말합니다.\n• 위 •의 “고액치료비암”에 대한 진단은 원발부위(최초 발생한 부위)를 기준으로 5. (보험료의 납입을 연체하여 해지된 계약의 부활(효력회복))"}, {"id": "c07", "name": "11대특정암진단비", "sub": "11개 주요 암 한정", "text": "11 11대특정암진단비(비갱신형/갱신형) 특별약관 약\n • 이 특별약관에서󰡒11대특정암󰡓이라 함은 「11대특정암 분류표」(【별표24】11대특\n 관\n 정암 분류표 참조)에서 정한 식도의 악성신생물(암) / 췌장의 악성신생물(암)/ 골\n 및 관절연골의 악성신생물(암)/ 뇌 및 중추신경계의 기타부위의 악성신생물(암)/\n1. (보험금의 지급사유) 림프, 조혈 및 관련조직의 악성신생물(암)/ 간 및 간내 담관의 악성신생물(암)/ 담\n• 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일 낭의 악성신생물(암)/ 담도의 기타 및 상세불명 부분의 악성신생물(암)/ 기관의 악\n (책임개시일) 이후에 11대특정암으로 진단확정된 경우에는 1회에 한하여 이 특별 성신생물(암)/ 기관지 및 폐의 악성신생물(암)/ 소장의 악성신생물(암) 을 말합니다. 상\n • 위 •의 “11대특정암”에 대한 진단은 원발부위(최초 발생한 부위)를 기준으로 진 해\n 약관의 보험가입급액을 11대특정암진단비로 지급합니다.\n• 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다. 단 확정된 경우에 한합니다.\n\n 구분 보장개시일(책임개시일) 11대특정암진단비 보장 예시\n 비갱신형 및 보험계약일로부터 그 날을 포함하여 90일이 지난날의 다음날 보험 특정암(원발부위가 11대특정암이 아닌 암)으로 암진단비에서 보장을 받은 후 질\n 갱신형(최초계약) 단, 피보험자가 15세미만인 경우 제1회 보험료를 받은 때 지식 특정암이 11대특정암으로 전이되었다면 11대특정암진단비는 지급되지 않습 병\n 니다. 즉, 11대특정암진단비에서 보장을 받으려면 11대특정암은 전이암이\n 갱신형(갱신계약) 이 특별약관의 갱신일 아닌 원발암이어야 합니다.\n\n •󰡒11대특정암󰡓의 진단확정은 병리 또는 진단검사의학의 전문의사 자격증을 가진 질\n 11대특정암 보장개시일 병\n 자에 의하여 내려져야 하며, 이 진단은 조직(fixed tissue)검사, 미세바늘흡인검사 및\n예시 - 비갱신형 및 갱신형(최초계약)의 경우(피보험자가 15세이상인 경우) (fine needle aspiration biopsy) 또는 혈액(hemic system)검사에 대한 현미경 상\n 소견을 기초로 하여야 합니다. 이 경우 “11대특정암”의 진단확정 시점은 상기 검 해\n 계약일 보장개시일\n 사에 의한 결과보고 시점으로 합니다.\n 90일 • 위 •에 따른 “11대특정암”의 진단이 가능하지 않을 때에는 피보험자가 “11대특\n 정암”으로 진단 또는 치료를 받고 있음을 증명할 만한 문서화된 기록 또는 증거가 비\n 용\n 있어야 합니다. 손\n 2020.4.10 2020.7.9 해\n 11대특정암의 진단이 가능하지 않을 때\n• 위 •에도 불구하고 연장계약의 보장개시일(책임개시일)은 연장일로 합니다. 예시 - 피보험자가 조직검사 등 병리학적 검사를 받을 여유없이 급속한 병증\n 악화로 사망한 경우 배\n2. (보험금 지급에 관한 세부규정) - 종양의 발생부위 및 피보험자의 신체상태 등의 이유로 조직을 상\n 책\n보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지 추출하는 경우 생명의 위험을 초래할 수 있어 병리학적 검사를 시행할 임\n못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있 수 없는 경우\n습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하\n며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n 산\n 모\n\n 215\n\f☞ 목차로 돌아가기\n\n4. (특별약관의 무효)\n 12 고액치료비암진단비(비갱신형/갱신형) 특별약관\n피보험자가 이 특별약관의 보험계약일로부터 11대특정암에 대한 보장개시일(책임개시\n일)의 전일 이전에 11대특정암으로 진단확정되어 있는 경우에는 이 특별약관은 무효\n로 하며, 이미 납입한 보험료를 돌려드립니다.\n 1. (보험금의 지급사유)\n5. (보험료의 납입을 연체하여 해지된 계약의 부활(효력회복)) • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일\n부활(효력회복)되는"}, {"id": "c08", "name": "자녀7대암진단비", "sub": "어린이 특화 7대 암", "text": "13 자녀7대암진단비(비갱신형/갱신형) 특별약관\n • 이 특별약관에 있어서 “자녀7대암”이라 함은 골 및 관절연골, 뇌 및 중추신경계,\n 림프, 조혈관련조직, 부신, 남자의 경우 간 및 고환, 여자의 경우 신장 및 난소의\n 악성신생물(암)로서 자녀7대암분류표(【별표9】자녀7대암 분류표 참조)에 정한 질병\n1. (보험금의 지급사유) 을 말합니다.\n• 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일 • 위 •의 “자녀7대암”에 대한 진단은 원발부위(최초 발생한 부위)를 기준으로 진단\n (책임개시일) 이후에 자녀7대암으로 진단확정된 경우에는 1회에 한하여 이 특별 확정된 경우에 한합니다.\n 약관의 보험가입금액을 자녀7대암진단비로 지급합니다.\n• 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다. 자녀7대암진단비 보장 예시\n 구분 보장개시일(책임개시일) 보험 특정암(원발부위가 자녀7대암이 아닌 암)으로 암진단비에서 보장을 받은 후\n 지식 특정암이 자녀7대암으로 전이되었다면 자녀7대암진단비는 지급되지 않습니\n 비갱신형 및 보험계약일로부터 그 날을 포함하여 90일이 지난날의 다음날 다. 즉, 자녀7대암으로 자녀7대암진단비에서 보장을 받으려면 자녀7대암은\n 갱신형(최초계약) 단, 피보험자가 15세미만인 경우 제1회 보험료를 받은 때 전이암이 아닌 원발암이어야 합니다.\n 갱신형(갱신계약) 이 특별약관의 갱신일 • “자녀7대암” 의 진단확정은 병리 또는 진단검사의학의 전문의사 자격증을 가진 자\n 에 의하여 내려져야 하며, 이 진단은 조직(fixed tissue)검사, 미세바늘흡인검사\n 자녀7대암 보장개시일 (fine needle aspiration biopsy)또는 혈액(hemic system)검사에 대한 현미경\n예시 - 비갱신형 및 갱신형(최초계약)의 경우(피보험자가 15세이상인 경우) 소견을 기초로 하여야 합니다. 이 경우 “자녀7대암”의 진단확정 시점은 상기 검사\n 에 의한 결과보고 시점으로 합니다.\n 계약일 보장개시일 • 위 •에 따른 “자녀7대암”의 진단이 가능하지 않을 때에는 피보험자가 “자녀7대\n 암”으로 진단 또는 치료를 받고 있음을 증명할 만한 문서화된 기록 또는 증거가\n 있어야 합니다.\n 90일\n 자녀7대암의 진단이 가능하지 않을 때\n 예시 - 피보험자가 조직검사 등 병리학적 검사를 받을 여유없이 급속한 병증\n 2020.4.10 2020.7.9\n 악화로 사망한 경우\n - 종양의 발생부위 및 피보험자의 신체상태 등의 이유로 조직을\n2. (보험금 지급에 관한 세부규정) 추출하는 경우 생명의 위험을 초래할 수 있어 병리학적 검사를 시행할\n보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지 수 없는 경우\n못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있\n습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하\n며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다. 4. (특별약관의 무효)\n 피보험자가 이 특별약관의 보험계약일로부터 자녀7대암에 대한 보장개시일(책임개시\n 일)의 전일 이전에 자녀7대암으로 진단확정되어 있는 경우에는 이 특별약관은 무효로\n 하며, 이미 납입한 보험료를 돌려드립니다.\n\n 218\n\f☞ 목차로 돌아가기 무배당 프로미라이프 아이(I)러브(LOVE)플러스건강보험2604\n 특\n5. (보험료의 납입을 연체하여 해지된 계약의 부활(효력회복)) 별\n 14 소아백혈병진단비(비갱신형/갱신형) 특별약관 약\n부활(효력회복)되는 계약의 보장개시는 보통약관 29.(보험료의 납입을 연체하여 해지\n 관\n된 계약의 부활(효력회복))을 따릅니다. 단, 부활(효력회복)시 15세이상인 경우 보장\n개시일(책임개시일)은 부활(효력회복)일로부터 그날을 포함하여 90일이 지난날의 다\n음날입니다. 1. (보험금의 지급사유)\n • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일\n6. (특별약관의 소멸) (책임개시일) 이후에 소아백혈병으로 진단확정된 경우에는 1회에 한하여"}, {"id": "c09", "name": "중증갑상선암진단비Ⅱ", "sub": "갑상선암 중 중증만", "text": "10 (통합간편)중증갑상선암진단비Ⅱ(비갱신형/갱신형) 90일\n 특별약관\n 2024.4.10 2024.7.9\n1. (보험금의 지급사유)\n 질\n• 회사는 보험증권에 기재된 피보험자가 이 특별약관의 보험기간 중에 보장개시일\n (책임개시일) 이후에 중증갑상선암으로 진단확정된 경우에는 1회에 한하여 다음과 병\n 2. (보험금 지급에 관한 세부규정)\n 같이 중증갑상선암진단비를 지급합니다.\n 보험수익자와 회사가 1. (보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n ① 비갱신형 및 갱신형(최초계약)의 경우\n 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있\n 구분 지급금액 습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하\n 며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n 경과기간 지급금액 질\n 보험계약일로부터 이 특별약관 보험가입금액의 3. (“중증갑상선암”의 정의 및 진단확정)\n 중증갑상선암진단비Ⅱ 병\n 1년미만 50% • 이 특별약관에 있어서 “갑상선암”이라 함은 「갑상선암 분류표」(【별표30】갑상선암\n (1회한) 분류표 참조. 이하 같습니다)에서 정한 갑상선의 악성신생물을 말합니다. 및\n 보험계약일로부터 이 특별약관 보험가입금액의\n • 이 특별약관에 있어서 “중증갑상선암”이라 함은 위 •의 “갑상선암” 중에서 “갑상선 상\n 1년이상 100%\n 수질암(Medullary Thyroid Cancer)” 또는 “갑상선 역형성암(미분화암, Anaplastic 해\n Thyroid Cancer)”에 해당하는 질병을 말합니다.\n ② 갱신형(갱신계약)의 경우 • 위 •의 “중증갑상선암”에 대한 진단은 원발부위(최초 발생한 부위)를 기준으로\n 진단 확정된 경우에 한합니다.\n 구분 지급금액\n 중증갑상선암진단비Ⅱ(1회한) 이 특별약관 보험가입금액의 100%\n 배\n 상\n 책\n 173 임\n\f☞ 목차로 돌아가기\n\n 6. (특별약관의 소멸)\n 중증갑상선암진단비 보장 예시 • 회사가 1. (보험금의 지급사유)에서 정한 중증갑상선암진단비를 지급한 경우에 그\n보험 특정암(원발부위가 중증갑상선암이 아닌 암)으로 암진단비에서 보장을 받은 손해보장의 원인이 생긴 때로부터 이 특별약관은 소멸됩니다.\n지식 후 특정암이 중증갑상선암으로 전이되었다면 중증갑상선암진단비는 지급되지 • 위 •에 따라 특별약관이 소멸되는 경우에 회사는 해약환급금을 지급하지 않습니다.\n 않습니다. • 위 • 이외의 원인으로 특별약관이 소멸되는 경우 “보험료 및 해약환급금 산출방\n 즉, 중증갑상선암으로 중증갑상선암진단비에서 보장을 받으려면 중증갑상선 법서”에서 정하는 바에 따라 회사가 그 때까지 적립한 계약자적립액 및 미경과보\n 험료를 지급합니다.\n 암은 전이암이 아닌 원발암이어야 합니다.\n\n• “중증갑상선암”의 진단확정은 병리 또는 진단검사의학의 전문의사 자격증을 가진\n 7. (특별약관의 갱신)\n 자에 의하여 내려져야 하며, 이 진단은 조직(fixed tissue)검사, 미세바늘흡인검사 이 특별약관을 갱신형으로 가입한 경우에는 『제도성 특별약관 [6. 갱신형 계약 자동\n (fine needle aspiration) 또는 혈액(hemic system)검사에 대한 현미경 소견을 갱신 특별약관]』에 따라 갱신됩니다.\n 기초로 하여야 합니다. 이 경우 “중증갑상선암”의 진단확정 시점은 상기 검사에\n 의한 결과보고 시점으로 합니다. 8. (준용규정)\n• 위 •에 따른 “중증갑상선암”의 진단이 가능하지 않을 때에는 피보험자가 “중증갑 이 특별약관에 정하지 않은 사항은 보통약관을 따릅니다. 다만, 이 특별약관에서는\n 상선암”으로 진단 또는 치료를 받고 있음을 증명할 만한 문서화된 기록 또는 증거 보통약관에서 정한 9. (만기환급금의 지급)의 만기환급금 및 37. (중도인출금)의 중\n 가 있어야 합니다. 도인출금은 지급하지 않으며, 보통약관 5. (보험금을 지급하지 않는 사유) • 및 보\n 통약관 15. (계약 후 알릴 의무)는 적용하지 않습니다. 또한 “실속형 계약”으로 가입\n “중증갑상선암”의 진단이"}, {"id": "c10", "name": "계속받는암진단비", "sub": "재진단 시 반복 지급", "text": "10 계속받는암진단비(유사암,대장점막내암,전립선암 제외)\n 2015. 2015.\n (비갱신형/갱신형) 특별약관 10.1 12.30\n 2016.1.1 2018.1.1 2020.1.1 2022.1.1\n\n 질\n1. (보험금의 지급사유) • 계약체결시 피보험자가 \"태아\"이고 \"출생전자녀가입 특별약관\"이 부가된 계약인 경 병\n• 회사는 보험증권에 기재된 피보험자가 이 특별약관의 보험기간 중에 보장개시일 우 이 특별약관의 보장개시일은 피보험자의 보험나이 0세 계약해당일로 합니다.\n (책임개시일) 이후에 “재진단암(유사암,대장점막내암,전립선암 제외)”으로 진단확정\n 된 경우에는 이 특별약관의 보험가입금액을 계속받는암진단비로 지급합니다. 2. (보험금 지급에 관한 세부규정)\n• 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다. 질\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지 병\n 구분 보장개시일(책임개시일) 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있 및\n 습니다. 제3자는 의료법 제3조(의료기관)에서 규정한 종합병원 소속 전문의 중에 정 상\n 해\n 첫 번째 재진 ub": "통합형", "text": "가. 간병인 사용 기간 및 금액이 기재된 영수증(사업자등록된 업체가 발행한 236 통합유사암진단비(비갱신형/갱신형) 특별약관\n 영수증으로, 사업자등록번호를 포함하여야 하며, 간이영수증을 제외한 카드\n 전표 또는 국세청에 통보된 현금영수증이어야 합니다) 다만, 해당 서류의\n 제출이 불가능한 경우에는 간이영수증과 거래방법을 추가로 확인할 수 있 1. (보험금의 지급사유)\n 는 서류(계좌이체내역 등) 및 피보험자가 실제로 유상으로 간병인을 사용\n 했음을 확인할 수 있는 사업자등록된 업체의 증빙서류 등으로 갈음할 수 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중에 보장개시일(책\n 있습니다 임개시일) 이후에 제자리암(피부및유방), 제자리암(자궁경부및생식기관), 제자리암(기\n 나. 사업자등록증 및 국세청 업종코드를 확인할 수 있는 서류(사업자의 직인 또 타), 경계성종양, 기타피부암, 갑상선암으로 진단확정된 경우 이 특별약관에 따라 다\n 는 서명이 담겨있어야 합니다) 음의 금액을 지급합니다.\n ⑤ 회사는 간병인 필요사유 및 실제 사용여부 확인이 필요한 경우 계약자, 피보\n 험자 또는 보험수익자에게 간병인, 병원 종사자 등의 사실관계 확인 또는 추\n 가적인 증빙서류(간병인사용계약서, 간병인사용확인서, 간병 기록을 확인할 수\n 있는 간병근무일지, 간호기록 등) 제출을 요청할 수 있습니다.\n ⑥ 회사는 간병인과 피보험자와의 관계 및 간병여부 등을 확인할 수 있는 추가\n 서류를 요청할 수 있습니다.\n ⑦ 기타 보험수익자가 보험금 등의 수령에 필요하여 제출하는 서류\n\n 702\n\f☞ 목차로 돌아가기 무배당 프로미라이프 아이(I)러브(LOVE)플러스건강보험2604\n 특\n 별\n 구분 지급금액 “기타피부암” 및 “갑상선암”의 진단이 가능하지 않을 때 약\n 예시 - 피보험자가 조직검사 등 병리학적 검사를 받을 여유없이 급속한 병증 관\n 제자리암진단비(피부및유방)\n 제자리암진단비(자궁경부및생식기관) 악화로 사망한 경우\n 제자리암진단비(기타) - 종양의 발생부위 및 피보험자의 신체상태 등의 이유로 조직을\n 경계성종양진단비 이 특별약관 보험가입금액의 100% 추출하는 경우 생명의 위험을 초래할 수 있어 병리학적 검사를 시행할\n 기타피부암진단비 수 없는 경우 상\n 해\n 갑상선암진단비\n (각각 1회한)\n 유의사항\n 보험 한국표준질병·사인분류 지침서의 \"사망 및 질병이환의 분류번호부여를 위한\n2. (보험금 지급에 관한 세부규정) 지식 선정준칙과 지침\"에 따라 C77~C80(이차성 및 상세불명 부위의 악성신생물 질\n보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지 (암))의 경우 일차성 악성신생물(암)이 확인되는 경우에는 원발부위(최초 발 병\n못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 있\n 생한 부위)를 기준으로 분류합니다. 다만, 이 경우에도 원발부위의 암이 완\n습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하\n며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다. 치되었다면 이차성 및 상세불명 부위의 악성신생물(암)(C77-C80)의 진단 확\n 정 시점은 원발암 진단 확정 시점으로 변경되지 않습니다.\n 질\n3. (“기타피부암” 및 “갑상선암”의 정의 및 진단확정) 병\n 및\n• 이 특별약관에 있어서 “기타피부암”이라 함은 「기타피부암 및 갑상선암 분류표」 < 원발부위(최초 발생한 부위) 기준 예시 > 상\n (【별표10-2】기타피부암 및 갑상선암 분류표 참조) 중 분류번호 C44에 해당하는 해\n 질병을 말합니다. - C73(갑상선의 악성신생물)이 림프절로 전이되어 C77(림프절의 이차성 및\n• 이 특별약관에 있어서 “갑상선암”이라 함은 「기타피부암 및 갑상선암 분류표」(【별 상세불명의 악성신생물)로 진단된 경우에도 C73(갑상선의 악성신생물)에\n 표10-2】기타피부암 및 갑상선암 분류표 참조) 중 분류번호 C73에 해당하는 질병 해당하는 질병으로 봅니다.\n 을 말합니다. 비\n - C50(유방의 악성신생물)이 폐로 전이되"}]}, {"id": "g04", "label": "암주요치료비", "icon": "🏨", "category": "암 치료", "tip": "어느 병원에서 받느냐(종합·상급종합), 한도(연간 얼마), 지급방식(연1회/세부보장별)이 핵심 차이.", "coverages": [{"id": "c15", "name": "암주요치료비Ⅱ", "sub": "종합병원·연간 1회", "text": "227 암주요치료비Ⅱ(유사암제외)(연간1회한)(10년지급대상)\n• 회사가 1.(보험금의 지급사유) 중 1-3.(두번째 질병 진단 후 세 번째 질병 진단\n 시)에서 정한 두 번째 질병 진단 후 세 번째 질병으로 보험금을 지급한 경우에\n (비갱신형/갱신형) 특별약관\n 그 손해보장의 원인이 생긴 때로부터 이 특별약관은 소멸됩니다.\n• 위 •에 따라 이 특별약관의 보장책임이 소멸되는 경우에 회사는 해약환급금을 지 1. (보험금의 지급사유)\n 급하지 않습니다. • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중에 보장개시일\n• 위 •의 이외의 원인에 따라 이 특별약관이 소멸되는 경우에는 “보험료 및 해약 (책임개시일) 이후에 “암(유사암제외)”으로 최초 진단확정되고, “보험금 지급 대상\n 환급금 산출방법서”에서 정하는 바에 따라 회사가 그 때까지 적립한 계약자적립 기간” 이내에 암주요치료(암수술, 항암방사선치료, 항암약물치료)를 받은 경우 연\n 액 및 미경과보험료를 지급합니다. 간 1회에 한하여 다음과 같이 암주요치료비Ⅱ(유사암제외)를 지급합니다.\n\n7. (특별약관의 제2회 이후 보험료의 납입) 구분 지급금액\n이 특별약관의 제2회 이후 보험료의 납입은 보통약관 26.(제2회 이후 보험료의 납 이 특별약관 보험가입금액의 100%로\n입)을 따릅니다. 단, 1.(보험금의 지급사유) 중 1-1.(첫 번째 질병 진단시)에서 정한 암주요치료비Ⅱ\n 보험금 지급대상기간 동안\n첫 번째 질병으로 보험금을 지급한 이후에는 차회 이후의 이 특별약관의 보장보험료 (유사암제외)\n 연간1회한 지급(최대10회지급)\n납입을 면제하여 드립니다.\n • 위 •의 암주요치료는 “암(유사암제외)”(최초 진단과 상이한 “암(유사암제외)”도 포\n8. (특별약관의 해약환급금) 함합니다)을 치료하기 위한 진료행위를 말합니다.\n • 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다.\n이 특별약관의 해약환급금은 보통약관 35.(해약환급금)을 따릅니다. 단, 1.(보험금의 지급\n사유) 중 1-1.(첫 번째 질병 진단시)에서 정한 첫 번째 질병으로 보험금을 지급한 이후, 구분 보장개시일(책임개시일)\n이 특별약관을 해지하는 경우에는 “보험료 및 해약환급금 산출방법서”에서 정하는 바에 따\n라 회사가 그 때까지 적립한 계약자적립액 및 미경과보험료를 지급합니다. 비갱신형 및 보험계약일로부터 그 날을 포함하여 90일이 지난날의 다음날\n 갱신형(최초계약) 단, 피보험자가 15세미만인 경우 제1회 보험료를 받은 때\n9. (준용규정)\n 갱신형(갱신계약) 이 담보의 갱신일\n이 특별약관에 정하지 않은 사항은 보통약관을 따릅니다. 단, 이 특별약관에서는 보\n통약관에서 정한 9.(만기환급금의 지급)의 만기환급금 및 37.(중도인출금)의 중도인출 암(유사암제외) 보장개시일\n금은 지급하지 않으며, 보통약관 5.(보험금을 지급하지 않는 사유) • 및 15.(계약\n후 알릴 의무)는 적용하지 않습니다. 예시 - 비갱신형 및 갱신형(최초계약)의 경우(피보험자가 15세이상인 경우)\n\n 계약일 보장개시일\n\n 90일\n\n 2024.4.10 2024.7.9\n\n 682\n\f☞ 목차로 돌아가기 무배당 프로미라이프 아이(I)러브(LOVE)플러스건강보험2604\n 특\n• 위 •의 \"보험금 지급 대상기간\"이라 함은 “암(유사암제외)”의 최초 진단확정일로부터 별\n 10년을 말합니다. 암주요치료비Ⅱ(유사암 제외)(연간1 [{"id": "c30", "name": "암수술비", "sub": "유사암 제외·매회 지급", "text": "⑨ 정상분만, 치과질환 76 암수술비(유사암 제외)(비갱신형/갱신형) 특별약관\n\n4. (“입원”의 정의와 장소)\n이 특별약관에서 “입원”이라 함은 「병원 또는 의원(한방병원 또는 한의원을 포함합니 1. (보험금의 지급사유)\n다)등의 의사, 치과의사 또는 한의사의 자격을 가진 자」(이하 “의사”라 합니다)에 의 • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중에 보장개시일\n하여 질병의 치료가 필요하다고 인정한 경우입니다. (책임개시일) 이후에 암(유사암 제외)으로 진단확정되고 그 치료를 직접적인 목적\n자택 등에서의 치료가 곤란하여 의료법 제3조(의료기관)에서 정한 국내의 병원, 의원 으로 수술을 받은 경우에는 매 수술시마다 이 특별약관의 보험가입금액을 암수술\n또는 국외의 의료관련법에서 정한 의료기관에 입실하여 의사의 관리하에 치료에 전념 비(유사암제외)로 지급합니다.\n하는 것을 말합니다. • 위 •에서 보장개시일(책임개시일)이라 함은 다음과 같습니다.\n\n5. (특별약관의 소멸) 구분 보장개시일(책임개시일)\n• 보험증권에 기재된 피보험자가 보험기간 중에 사망할 경우에 이 특별약관은 소멸됩니다. 비갱신형 및 보험계약일로부터 그 날을 포함하여 90일이 지난날의 다음날\n• 위 •에 따라 이 특별약관이 소멸되는 경우에는 “보험료 및 해약환급금 산출방법 갱신형(최초계약) 단, 피보험자가 15세미만인 경우 제1회 보험료를 받은 때\n 서”에서 정하는 바에 따라 회사가 그때까지 적립한 계약자적립액 및 미경과보험료\n 를 지급합니다. 갱신형(갱신계약) 이 특별약관의 갱신일\n\n6. (특별약관의 갱신)\n 암(유사암 제외) 보장개시일\n이 특별약관을 갱신형으로 가입한 경우에는 『제도성 특별약관 [10.갱신형 계약 자동\n갱신 특별약관]』에 따라 갱신됩니다. 예시 - 비갱신형 및 갱신형(최초계약)의 경우(피보험자가 15세이상인 경우)\n 계약일 보장개시일\n7. (준용규정)\n이 특별약관에 정하지 않은 사항은 보통약관을 따릅니다. 단, 이 특별약관에서는 보 90일\n통약관에서 정한 9.(만기환급금의 지급)의 만기환급금 및 37.(중도인출금)의 중도인\n출금은 지급하지 않으며, 보통약관 15.(계약 후 알릴 의무)는 적용하지 않습니다. 또\n한 4종을 제외한 갱신형에 한하여 보통약관 26-1.(보험료 납입면제)는 적용하지 않 2020.4.10 2020.7.9\n습니다.\n • 위 •에도 불구하고 연장계약의 보장개시일(책임개시일)은 연장일로 합니다.\n\n 2. (보험금 지급에 관한 세부규정)\n • “항암방사선치료” 및 “항암약물치료”는 암수술비(유사암제외) 보험금이 지급되지\n 않습니다.\n • 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하\n 지 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를\n 수 있습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의\n 중에 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n\n 296\n\f☞ 목차로 돌아가기 무배당 프로미라이프 아이(I)러브(LOVE)플러스건강보험2604\n 특\n3. (“암” 등의 정의 및 진단확정) • 위 •에 따른 “암(유사암 제외)”의 진단이 가능하지 않을 때에는 피보험자가 “암 별\n (유사암 제외)”으로 진단 또는 치료를 받고 있음을 증명할 만한 문서화된 기록 또 약\n• 이 특별약관에서 “암”이라 함은 「악성신생물(암) 분류표」(【별표10-1】악성신생물(암)\n 분류표 참조)에서 정한 질병을 말합니다. 다만, 전암(前癌)상태(암으로 변하기 이 는 증거가 있어야 합니다. 관\n 전 상태, premalignant condition or condition with malignant potential)는\n 제외합니다. 암(유사암 제외)의 진단이 가능하지 않을 때\n• 이 특별약관에서 “암(유사암제외)”이라 함은  (뇌경색증, I63)\n • 뇌경색증(I63)의 진단확정은 의료법 제3조에서 정한 국내의 병원이나 의원 또는\n 이와 동등하다고 회사가 인정하는 국외의 의료기관의 의사(치과의사 제외) 자격증\n1-2. (보험금의 지급사유(혈전용해치료비Ⅱ(급성심근경색증, I21))) 을 가진 자에 의하여 내려져야 하며, 이 진단은 병력, 신경학적 검진과 함께 뇌전\n회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일(책임 산화단층촬영(Brain CT scan), 자기공명영상(MRI), 뇌혈관조영술, 양전자방출단층\n개시일) 이후에 급성심근경색증(I21)의 직접적인 치료를 목적으로 “혈전용해치료”를 술(PET), 단일광자방출 전산화 단층촬영(SPECT), 뇌척수액검사 등을 기초로 하여\n받은 경우에는 1회에 한하여 다음과 같이 혈전용해치료비Ⅱ(급성심근경색증, I21)를 야 합니다. 그러나 피보험자가 사망하여 상기 검사방법을 진단의 기초로 할 수 없\n지급합니다. 는 경우 다음 각호의 어느 하나에 해당하는 경우에는 진단확정이 있는 것으로 볼\n ① 비갱신형 및 갱신형(최초계약)의 경우 수 있습니다.\n ① 보험기간 중 뇌경색증(I63)으로 진단 또는 치료를 받고 있었음을 증명할 수\n 구분 지급금액 있는 문서화된 기록 또는 증거가 있는 경우\n ② 부검감정서상 사인이 뇌경색증(I63)으로 확정되거나 추정되는 경우"}, {"id": "c48", "name": "혈전용해치료비Ⅱ", "sub": "연간 1회한", "text": "② 72 (통합간편)혈전용해치료비Ⅱ(연간1회한) 약\n (비갱신형/갱신형) 특별약관 관\n\n 2021.1.1 2021.7.1 2022.1.1 1. (보험금의 지급사유)\n 보험가입일 상해로 오른쪽 눈의 질병으로 그 오른쪽 눈의 1-1. (보험금의 지급사유(혈전용해치료비Ⅱ(뇌경색증, I63)))\n 교정시력이0.1이하 교정시력이 0.02이하가\n (지급률15%)인 상태 된 경우(지급률 35%)\n • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일\n (책임개시일) 이후에 뇌경색증(I63)의 직접적인 치료를 목적으로 “혈전용해치료”를 상\n → 장해지급률 35%에서 상해로 인한 장해지급률 15%를 뺀 20%(=35%- 받은 경우에는 연간 1회에 한하여 다음과 같이 혈전용해치료비Ⅱ(뇌경색증, I63) 해\n 15%)에 해당하는 후유장해보험금을 지급 를 지급합니다.\n ① 비갱신형 및 갱신형(최초계약)의 경우\n3. (특별약관의 소멸) 구분 지급금액\n• 보험증권에 기재된 피보험자가 보험기간 중에 사망할 경우에 이 특별약관은 소멸\n 됩니다. 경과기간 지급금액\n• 위 •에 따라 이 특별약관이 소멸되는 경우 “보험료 및 해약환급금 산출방법서”에 보험계약일로부터 이 특별약관 보험가입금액의\n 서 정하는 바에 따라 회사가 그 때까지 적립한 계약자적립액 및 미경과보험료를 90일미만 5%\n 지급합니다. 혈전용해치료비Ⅱ 질\n (뇌경색증, I63) 보험계약일로부터 이 특별약관 보험가입금액의\n 90일~1년미만 50% 병\n4. (특별약관의 갱신)\n 보험계약일로부터 이 특별약관 보험가입금액의\n이 특별약관을 갱신형으로 가입한 경우에는 『제도성 특별약관 [6. 갱신형 계약 자동 1년이상 100%\n갱신 특별약관]』에 따라 갱신됩니다.\n ② 갱신형(갱신계약)의 경우\n5. (준용규정)\n이 특별약관에 정하지 않은 사항은 보통약관을 따릅니다. 다만, 이 특별약관에서는 구분 지급금액 질\n보통약관에서 정한 9. (만기환급금의 지급)의 만기환급금 및 37. (중도인출금)의 중 병\n도인출금은 지급하지 않으며, 보통약관 5. (보험금을 지급하지 않는 사유) • 및 보 혈전용해치료비Ⅱ\n 이 특별약관 보험가입금액의 100% 및\n통약관 15. (계약 후 알릴 의무)는 적용하지 않습니다. 또한 “실속형 계약”으로 가입 (뇌경색증, I63)\n하는 경우 보통약관 26-1. (보험료 납입면제(고급형 계약限))는 적용하지 않습니다. 상\n • 위 •의 “연간”이란, 보험기간 시작일부터 그날을 포함하여 매1년 단위로 도래하 해\n 는 계약해당일(최초 보험기간 시작일과 동일한 월,일을 말합니다) 전일까지의 기\n 간을 말합니다.\n\n 1-2. (보험금의 지급사유(혈전용해치료비Ⅱ(급성심근경색증, I21)))\n • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일 배\n (책임개시일) 이후에 급성심근경색증(I21)의 직접적인 치료를 목적으로 “혈전용해 상\n 책\n 305 임\n\f☞ 목차로 돌아가기\n\n 치료”를 받은 경우에는 연간 1회에 한하여 다음과 같이 혈전용해치료비Ⅱ(급성심 을 가진 자에 의하여 내려져야 하며, 이 진단은 병력, 신경학적 검진과 함께 뇌전\n 근경색증, I21)를 지급합니다. 산화단층촬영(Brain CT scan), 자기공명영상(MRI), 뇌혈관조영술, 양전자방출단층\n ① 비갱신형 및 갱신형(최초계약)의 경우 술(PET), 단일광자방출 전산화 단층촬영(SPECT), 뇌척수액검사 등을 기초로 하여\n 야 합니다. 그러나 피보험자가 사망하여 상기 검사방법을 진단의 기초로 할 수\n 구분 지급금액 없는 경우 다음 각호의 어느 하나에 해당하는 경우에는 진단확정이 있는 것으로\n 볼 수 있습니다.\n 경과기간 지급금액 ① 보험기간 중 뇌경색증(I63)으로 진단 또는 치료를 받고 있었음을 증명할 수\n 보험계약일로부터 이 특별약관 보험가입금액의 있는 문서화된 기록 또는 증거가 있는 경우\n 90일미만 5% ② 부검감정서상 사인이 뇌경색증(I63)으로 확정되거나 추정되는 경우\n 혈전용해치료비Ⅱ\n (급성심근경색증, I21) 보험계약일로부터 이 특별약관 보험가입금액의"}, {"id": "c49", "name": "혈전용해치료비Ⅲ", "sub": "최초 1회한", "text": "135 혈전용해치료비Ⅲ(최초1회한)(비갱신형/갱신형)\n• 이 특별약관에 있어서 “혈전용해치료”라 함은 의사가 “뇌경색증(I63)” 및 “급성심\n 근경색증(I21)”의 직접적인 치료를 목적으로 “혈전용해제”를 정맥혈관 또는 동맥혈\n 특별약관\n 관에 주입하여 뇌혈관 및 심혈관 부분의 혈전 또는 색전을 녹이기 위한 치료법을\n 말합니다. 1. (보험금의 지급사유)\n• 위 •에서 “혈전용해제”라 함은 뇌혈관 및 심혈관 부분의 혈전 또는 색전을 녹이 1-1. (보험금의 지급사유(혈전용해치료비Ⅲ(뇌졸중)))\n 기 위해 정맥혈관 또는 동맥혈관에 주사하는 약물(tPA, tissue plasminogen\n 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일(책임\n activator 또는 Urokinase 등)을 말하며, 항응고제(헤파린 등) 및 경구용약제\n 개시일) 이후에 뇌졸중으로 진단확정되고, 뇌졸중의 직접적인 치료를 목적으로 “혈전\n (Plavix, Aspirin 등)는 제외됩니다.\n 용해치료”를 받은 경우에는 최초 1회에 한하여 이 특별약관의 가입금액을 혈전용해치\n• 위 •에서 혈전용해제를 투여하지 않은 기계적혈전제거술(카테터 등)은 혈전용해\n 료비Ⅲ(뇌졸중)로 지급합니다.\n 치료에서 제외됩니다.\n 1-2. (보험금의 지급사유(혈전용해치료비Ⅲ(특정허혈심장질환)))\n6. (특별약관의 소멸)\n 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」 중 보장개시일(책임\n• 보험증권에 기재된 피보험자가 보험기간 중에 사망할 경우에 이 특별약관은 소멸됩니다.\n 개시일) 이후에 특정허혈심장질환으로 진단확정되고, 특정허혈심장질환의 직접적인\n• 위 •에 따라 이 특별약관이 소멸되는 경우에는 “보험료 및 해약환급금 산출방법\n 치료를 목적으로 “혈전용해치료”를 받은 경우에는 최초 1회에 한하여 이 특별약관의\n 서”에서 정하는 바에 따라 회사가 그때까지 적립한 계약자적립액 및 미경과보험료\n 가입금액을 혈전용해치료비Ⅲ(특정허혈심장질환)로 지급합니다.\n 를 지급합니다.\n\n7. (특별약관의 갱신) 2. (보험금 지급에 관한 세부규정)\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n이 특별약관을 갱신형으로 n 보장의 원인이 생긴 때로부터 이 특별약관은 소멸됩니다. 습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 정하 상\n 책\n• 위 • 에 따라 이 특별약관이 소멸되는 경우에 회사는 해약환급금을 지급하지 않습니다. 며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다. 임\n• 위 • 이외의 원인으로 계약이 소멸되는 경우 “보험료 및 해약환급금 산출방법서”\n 에서 정하는 바에 따라 회사가 그 때까지 적립한 계약자적립액 및 미경과보험료 3. (보험금을 지급하지 않는 사유)\n 를 지급합니다.\n • 회사는 아래에 열거된 행위로 인하여 생긴 질병수술비는 보장하지 않습니다.\n• 위 •의 규정에도 불구하고 피보험자, 보험수익자 또는 계약자의 고의로 인해 이\n 산\n 특별약관이 소멸되는 경우에는 보통약관 32.(중대사유로 인한 해지)의 규정을 따 모\n 릅니다.\n\n 197\n\f☞ 목차로 돌아가기\n\n ① 피보험자가 고의로 자신을 해친 경우. 다만, 피보험자가 심신상실 등으로 자유로운 가. 쌍꺼풀수술(이중검수술. 다만, 안검하수, 안검내반 등을 치료하기 위한 시력\n 의사결정을 할 수 없는 상태에서 자신을 해친 경우에는 보험금을 지급합니다. 개선 목적의 이중검수술은 보상합니다), 코성형수술(융비술), 유방확대(다\n ② 보험수익자가 고의로 피보험자를 해친 경우. 다만, 그 보험수익자가 보험금의 만, 유방암 환자의 유방재건술은 보상합니다)·축소술, 지방흡입술(다만, 「국\n 일부 보험수익자인 경우에는 다른 보험수익자에 대한 보험금은 지급합니다. 민건강보험법」 및 관련 고시에 따라 요양급여에 해당하는 ‘여성형 유방증’을\n ③ 계약자가 고의로 피보험자를 해친 경우 수술하면서 그 일련의 과정으로 시행한 지방흡입술은 보상합니다), 주름살\n ④ 전쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동 제거술 등\n• 회사는 한국표준질병사인분류에 따른 다음의 질병수술비에 대해서는 보장하지 않습니다. 나. 사시교정, 안와격리증(양쪽 눈을 감싸고 있는 뼈와 뼈 사이의 거리가 넓은 증\n ① 정신 및 행동장애(F04~F99)"}, {"id": "c65", "name": "질병수술비Q", "sub": "매회 지급", "text": "5. (특별약관의 무효) 100 질병수술비Q(매회지급)(비갱신형/갱신형) 특별약관\n피보험자가 이 특별약관의 보험계약일로부터 암(기타피부암 및 갑상선암 제외)에 대한 보\n장개시일(책임개시일)의 전일 이전에 암(기타피부암 및 갑상선암 제외)으로 진단확정되어\n있는 경우에는 이 특별약관은 무효로 하며, 이미 납입한 보험료를 돌려드립니다. 1. (보험금의 지급사유)\n • 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」중에 진단확정된\n6. (보험료의 납입을 연체하여 해지된 계약의 부활(효력회복))\n 질병의 치료를 직접적인 목적으로 수술을 받은 경우에는 수술 1회당 이 특별약관\n부활(효력회복)되는 계약의 보장개시는 보통약관 29.(보험료의 납입을 연체하여 해지 의 보험가입금액을 질병수술비로 지급합니다.\n된 계약의 부활(효력회복))을 따릅니다. 단, 피보험자가 부활(효력회복)시 15세이상인 • 위 •의 질병수술비는 동일한 질병을 직접적인 원인으로 동시에 두 종류 이상의 수\n경우 암(기타피부암 및 갑상선암 제외)에 대한 보장개시일(책임개시일)은 부활(효력회 술을 받은 경우에는 하나의 질병수술비만 지급합니다. 다만, 동시에 두 종류 이상\n복)일로부터 그날을 포함하여 90일이 지난날의 다음날입니다. 의 수술을 받은 경우라 하더라도 동일한 신체부위가 아닌 경우로서 의학적으로 치\n 료목적이 다른 독립적인 수술을 받은 경우에는 각각의 질병수술비를 지급합니다.\n7. (특별약관의 소멸) • 위 •에서 동일한 신체부위라 함은 각각 눈, 귀, 코, 씹어먹거나 말하기 기능과 관련\n• 회사가 1.(보험금의 지급사유) •에서 정한 표적항암방사선치료비(항암세기조절방 된 신체부위, 머리, 목, 척추(등뼈), 체간골, 흉부장기·복부장기·비뇨생식기, 팔, 다리,\n 사선)(최초1회한)를 지급한 경우에 그 손해보장의 원인이 생긴 때로부터 이 특별 손가락, 발가락을 말하며, 눈, 귀, 팔, 다리는 좌·우를 각각 다른 신체부위로 봅니다.\n 약관은 소멸됩니다.\n• 위 •에 따라 이 특별약관이 소멸되는 경우에 회사는 해약환급금을 지급하지 않 체간골 : ‘체간골’이라 함은 어깨뼈(견갑골), 골반뼈(장골, 제2천추 이하의 천\n 습니다. 용어 골, 미골, 좌골 포함), 빗장뼈(쇄골), 가슴뼈(흉골), 갈비뼈(늑골)를 말하며 이\n• 위 • 이외의 원인으로 이 특별약관이 소멸되는 경우 “보험료 및 해약환급금 산 풀이 를 모두 동일한 신체부위로 봅니다.\n 출방법서”에서 정하는 바에 따라 회사가 그 때까지 적립한 계약자적립액 및 미경\n 과보험료를 지급합니다. 동시에 두 종류 이상의 수술을 받은 경우 : 동시에 두 종류 이상의 수술을\n 받은 경우라 함은 같은 수술실에서 수술 부위와 관계없이 시간적으로 연속하\n 여 두 종류 이상의 수술을 받는 것을 말합니다.\n\n 334\n\f☞ 목차로 돌아가기 무배당 프로미라이프 아이(I)러브(LOVE)플러스건강보험2604\n 특\n2. (보험금 지급에 관한 세부규정) 별\n 관혈수술 : 병변 부위를 육안으로 직접 보면서 수술적 조작을 하기 위해 피 약\n• 1.(보험금의 지급사유)에도 불구하고 아래에 열거된 수술의 경우, 수술개시일부터\n 부에 절개를 가하고 병변부위를 노출시켜서 수술 관\n 60일 이내 2회 이상의 수술은 1회의 수술로 간주하여 1회의 수술보험금을 지급 용어\n 하며 이후 동일한 기준으로 반복 지급이 가능합니다. 풀이\n ① 일반적인 질병(제자리암·경계성종양 포함) 치료목적의 수술 근치수술 : 일회의 수술로 해당 질병을 완전히 치유할 수 있는 수술\n ㉮ 치료목적의 유방절제술(Mammotomy)\n ㉯ 경질적 자궁, 난소, 난관 수술 상\n 관혈적 악성신생물 근치수술 : 관혈적 방법을 통해 악성신생물의 원발 병소 해\n ㉰ 망막박리 수술\n ㉱ 레이저(Laser)에 의한 안구 수술 를 완전히 절제, 적제, 적출하고 혹은 곽청술을 함께 실시한 수술\n ㉲ 냉동응고에 의한 안구 수술\n ㉳ 중이내 튜브유치술 악성 신생물 근치 사이버 나이프(Cyberknife) 정위적 방사선 치료 : 선형가\n ㉴ 체외충격파쇄석술(E.S.W.L) 속기(LINAC)에서 발"}, {"id": "c66", "name": "질병수술비Ⅱ", "sub": "특정경증 제외·동일질병당", "text": "질병수술비Ⅱ(특정경증질환제외)(동일질병당1회지급)(맞춤간편고지) (ㅌ)\n (비갱신형/갱신형) 특별약관 ···································································· 585 통풍진단비Ⅱ(맞춤간편고지)(비갱신형/갱신형) 특별약관 ································ 307\n 질병수술비Ⅱ(특정경증질환제외)(매회지급)(맞춤간편고지) 통합암 항암방사선약물치료비Ⅱ(유사암제외)(맞춤간편고지)\n (비갱신형/갱신형) 특별약관 ···································································· 593 (비갱신형/갱신형) 특별약관 ···································································· 698\n 질병입원일당(1일이상180일한도)(맞춤간편고지)(비갱신형/갱신형) 특별약관 · · 195 통합암진단비Ⅱ(유사암제외)(맞춤간편고지)(비갱신형/갱신형) 특별약관 ··········· 222\n 질병입원일당(요양/정신/한방병원제외)(181일이상)(맞춤간편고지) 통합유사암진단비(맞춤간편고지)(비갱신형/갱신형) 특별약관 ·························· 619\n (비갱신형/갱신형) 특별약관 ···································································· 464 통합전이암 항암방사선약물치료비Ⅱ(맞춤간편고지)\n 질병입원일당Ⅱ 결정을 할 수 없는 상태에서 자신을 해친 경우에는 보험금을 지급합니다.\n 질병수술비 경과기간 지급금액\n ② 보험수익자가 고의로 피보험자를 해친 경우. 다만, 그 보험수익자가 보험금의\n (특정경증질환,백내장 및 보험계약일로부터 일부 보험수익자인 경우에는 다른 보험수익자에 대한 보험금은 지급합니다.\n 이 특별약관 보험가입금액의 50%\n 대장용종제외) 1년미만 ③ 계약자가 고의로 피보험자를 해친 경우\n (동일질병당1회지급) 보험계약일로부터 ④ 전쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동\n (맞춤간편고지) 이 특별약관 보험가입금액의 100%\n 1년이상 • 회사는 한국표준질병사인분류에 따른 다음의 질병수술비에 대해서는 보장하지 않\n 습니다.\n ② 갱신형(갱신계약)의 경우 ① 정신 및 행동장애(F04~F99)\n ② 여성생식기의 비염증성 장애로 인한 습관성 유산, 불임 및 인공수정관련 합병\n 구분 지급금액\n 증(N96~N98)이 보장개시일부터 2년이내에 발생한 경우\n 질병수술비 ③ 피보험자가 임신, 출산(제왕절개를 포함합니다), 산후기로 수술한 경우(O00~\n (특정경증질환,백내장 및 O99)\n 대장용종제외) 이 특별약관 보험가입금액의 100% ④ 선천기형, 변형 및 염색체이상(Q00-Q99)\n (동일질병당1회지급) ⑤ 비만(E66)\n (맞춤간편고지) ⑥ 요실금(N39.3, N39.4, R32)\n ⑦ 치핵 및 직장 또는 항문관련질환(I84, K60~K62, K64)\n• 위 •의 「특정경증질환」이란 다래끼, 결막염, 외이의 질환, 티눈을 말합니다.(【별표 ⑧ 치아우식증, 치아 및 치주질환 등의 치과질환(K00~K08)\n 86】 특정경증질환 분류표 참조) ⑨ 과잉포피, 포경 및 감돈포경, 음경의 기타 장애(N47~N48)\n• 위 •의 「백내장및대장용종」이란 백내장, 대장종양을 말합니다.(【별표87】 백내장/ ⑩ 다래끼, 결막염, 외이의 질환, 티눈(【별표86】 특정경증질환 분류표 참조)\n ⑪ 백내장, 대장종양(【별표87】 백내장/대장종양 분류표 참조)\n 대장종양 분류표 참조)\n • 회사는 아래 목적의 치료를 위한 질병수술비에 대하여는 보장하지 않습니다.\n숗 위 •의 질병수술비는 동일한 질병을 직접적인 원인으로 두 종류 이상의 수술을\n ① 건강검진, 예방접종, 인공유산\n 받거나 같은 종류의 수술을 2회 이상 받은 경우에는 하나의 질병수술비만 지급합\n\n 588\n\f☞ 목차로 돌아가기 무배당 프로미라이프 나에게 맞춘 간편건강보험2604\n 특\n ② 영양제, 비타민제, 호르몬 투여, 보신용 투약, 친자 확인을 위한 진단, 불임검 원 또는 국외의 의료관련법에서 정한 의료기관을 말합니다. 별\n 사, 불임수술, 불임복원술, 보조생식술(체내,체외 인공수정을 포함합니다), 성장 • 위 •의 수술에는 녹내장, 당뇨병성 망막병증 등 눈질환의 직접적인 치료를 목적으 약\n 촉진과 관련된 수술 관\n 로"}, {"id": "c69", "name": "119대질병수술비Ⅳ", "sub": "119대 질병 전용", "text": "절단 : 특정부위를 잘라내는 것 7 (통합간편)119대질병수술비Ⅳ(비갱신형/갱신형)\n용어 절제 : 특정부위를 잘라 없애는 것 특별약관\n풀이 흡인 : 주사기 등으로 빨아들이는 것\n 천자 : 바늘 또는 관을 꽂아 체액․조직을 뽑아내거나 약물을 주입하는 것 1. (보장의 범위)\n 이 특별약관은 다음의 5개의 세부보장으로 구성되어 있습니다.\n 신의료기술평가위원회\n 1. (통합간편)119대질병수술비Ⅳ(20대질병)\n용어 의료법 제54조(신의료기술평가위원회의 설치 등)에 의거 설치된 위원회로서 2. (통합간편)119대질병수술비Ⅳ(5대질병)\n풀이\n 신의료기술에 관한 최고의 심의기구를 말합니다. 3. (통합간편)119대질병수술비Ⅳ(68대생활질환)\n 4. (통합간편)119대질병수술비Ⅳ(특정다빈도4대질병)\n 5. (통합간편)119대질병수술비Ⅳ(22대질병)\n “기타 수술의 정의에 해당하지 않는 시술”이란?\n예시 - 의료기구를 사용 하여 생체에 절단, 절제의 조작이 음 중 어느 한 가지의 경우에 의하여 보험금 지급사유가 발생한 때에는 보\n보험 보장예시 험금을 지급하지 않습니다.\n지식 ① 피보험자의 치매를 제외한 정신적 기능장해, 선천성 뇌질환 및 심신상실\n A병원 단, 이 특별약관의 피보험자로 될 자가 계약체결시 출생 전 자녀(이하 “태아”\n A병원 → A병원\n (상급종합병원 라 합니다)인 경우에는 선천성 뇌질환(Q00-Q04)으로 인해 보험금 지급사유가\n 상급종합병 상급종합병원 퇴원일\n 이외의 병원) 발생한 때에도 보험금을 지급합니다.\n 원선정 적용일\n 최초입원일 ② 피보험자의 임신, 출산(제왕절개를 포함합니다), 산후기. 그러나 회사가 보장하\n 퇴원없이 … 는 보험금 지급사유로 인한 경우에는 보험금을 지급합니다.\n ←———————— ———————————→ ③ 성병\n 계속 입"}, {"id": "c75", "name": "질병입원일당Q", "sub": "1일~10일 한도", "text": "75 질병입원일당Q(1일이상10일한도)(비갱신형/갱신형) 병입원일당(1일이상10일한도)의 전부 또는 일부를 지급하지 않습니다. 질\n 병\n 특별약관 • 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하 및\n 지 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 상\n 수 있습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 해\n1. (보험금의 지급사유)\n 중에 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」중에 진단확정된 질\n병으로 인하여 「병원 또는 의원」(한방병원 또는 한의원을 포함합니다)에 1일 이상 계 비\n속 입원하여 치료를 받은 때에는 입원첫날부터 입원1일당 이 특별약관의 보험가입금 3. (보험금을 지급하지 않는 사유)\n 용\n액을 질병입원일당(1일이상10일한도)으로 지급합니다. 회사는 다음 중 어느 한 가지의 경우에 의하여 보험금 지급사유가 발생한 때에는 보 손\n 험금을 지급하지 않습니다. 해\n2. (보험금 지급에 관한 세부규정) ① 피보험자의 치매를 제외한 정신적 기능장해, 선천성 뇌질환 및 심신상실\n• 1.(보험금의 지급사유)의 질병입원일당(1일이상10일한도) 지급일수는 1회 입원당 단, 이 특별약관의 피보험자로 될 자가 계약체결시 출생 전 자녀(이하 “태아”\n 10일을 한도로 합니다. 라 합니다)인 경우에는 선천성 뇌질환(Q00-Q04)으로 인해 보험금 지급사유가 배\n• 동일한 질병의 치료를 목적으로 보험기간 중에 2회 이상 입원한 경우(동일한 질 발생한 때에도 보험금을 지급합니다. 상\n ② 피보험자의 임신, 출산(제왕절개를 포함합니다), 산후기. 그러나 회사가 보장하 책\n 병의 치료를 직접 목적으로 병원 또는 의원을 이전하여 입원한 경우를 포함)에는 임\n 이를 1회 입원으로 보아 각 입원일수를 합산하여 상기 •을 적용합니다. 는 보험금 지급사유로 인한 경우에는 보험금을 지급합니다.\n• 상기 •에도 불구하고 동일한 질병에 대한 입원이라도 질병입원일당(1일이상10일 ③ 성병\n 한도)이 지급된 최종입원의 퇴원일로부터 180일이 경과하여 개시한 입원은 새로 ④ 알코올중독, 습관성 약품 또는 환각제의 복용 및 사용\n 운 입원으로 봅니다. 다만 아래와 같이 질병입원일당(1일이상10일한도)이 지급된 ⑤ 전쟁, 외국의 무력행사, 혁명, 내란, 사변, 폭동\n 최종입원일로부터 180일이 경과하도록 퇴원없이 계속 입원중인 경우에는 질병입 산\n ⑥ 질병을 원인으로 하지 않는 신체검사, 예방접종, 인공유산, 불임시술, 제왕절개수술 모\n 원일당(1일이상10일한도)이 지급된 최종입원일의 그 다음날을 퇴원일로 봅니다. ⑦ 피로, 권태, 심신허약 등을 치료하기 위한 안정치료\n\n 295\n\f☞ 목차로 돌아가기\n\n ⑧ 위생관리, 미모를 위한 성형수술\n ⑨ 정상분만, 치과질환 76 암수술비(유사암 제외)(비갱신형/갱신형) 특별약관\n\n4. (“입원”의 정의와 장소)\n이 다)와 보험회사(이하 ‘회사’라 합니다)\n사이에 보험증권에 기재된 반려동물의 상해 또는 질병(이하 ‘사고’라 합니다)에 대한 질병 상해를 제외한 상병을 모두 포함합니다.\n위험을 보장하기 위하여 체결됩니다. 계약 전 알릴 의무와 관련하여 회사가 그 사실을 알았더라면\n 계약의 청약을 거절하거나 보험가입금액 한도 제한, 일부 보장\n2. (용어의 정의) 중요한 사항\n 제외, 보험금 삭감, 보험료 할증과 같이 조건부로 승낙하는 등\n이 특별약관에서 사용되는 용어의 정의는 이 특별약관의 다른 조항에서 달리 정의되 계약 승낙에 영향을 미칠 수 있는 사항을 말합니다.\n지 않는 한 다음과 같습니다.\n 회사와 계약자간에 약정한 금액으로 보험사고가 발생할 때\n 보험가입금액\n 계약관계 관련 용어 회사가 지급할 최대 보험금을 말합니다.\n\n 용어 정의 보험사고로 인하여 발생한 손해에 대하여 계약자 또는\n 자기부담금\n 피보험자가 부담하는 일정 금액을 말합니다.\n 회사와 계약을 체결하고 보험료를 납입할 의무를 지는 사람을\n 계약자 이 계약에서 보장하는 위험과 같은 위험을 보장하는 다른\n 말합니다.\n 보험금 분담 계약(공제계약을 포함합니다)이 있을 경우 비율에 따라 손해를\n 보험금 지급사유가 발생하는 때에 회사에 보험금을 청구하여 보상합니다.\n 보험수익자\n 받을 수 있는 사람을 말합니다.\n 계약의 성립과 그 내용을 증명하기 위하여 회사가 계약자에게 부가설명 음식물\n 보험증권\n 드리는 증서를 말합니다.\n 반려동물이 일상 생활 중 보호자 또는 생산자의 의도와 상관 없이 섭취할 수 있는\n 계약을 체결하기 위하여 피보험자가 건강진단을 받아야 하는 모든 식이 원료와 가공품 및 부산물(뼈, 과일 씨 등 폐기 대상물질)을 말하며, 사람\n 진단계약\n 계약을 말합니다. 및 다른 동물의 식이로 활용될 수 있는 모든 것을 포함합니다. 또한 음식물의\n 반려동물의 소유와 관련하여 보험사고로 손해를 입은 상태(부패, 감염 여부 등)와 상관없이 모두 포함됩니다.\n 피보험자 사람(법인인 경우에는 그 이사 또는 법인의 업무를 집행하는 그\n 밖의 기관)을 말합니다.\n\n 122\n\f☞ 목차로 돌아가기 무배당 프로미라이프 펫블리 반려견보험2604\n 특\n 지급금과 이자율 관련 용어 별\n 4. 설날 전날, 설날, 설날 다음날 (음력 12월 말일, 1월 1일, 2일) 약\n 용어 정의 5. 삭제 <2005. 6. 30> 관\n 6. 부처님오신날 (음력 4월 8일)\n 회사가 지급할 금전에 이자를 줄 때 1년마다 마지막 날에 그 7. 5월 5일 (어린이날)\n 연단위 복리 이자를 원금에 더한 금액을 다음 1년의 원금으로 하는 이자 8. 6월 6일 (현충일)\n 계산방법을 말합니다.\n 9. 추석 전날, 추석, 추석 다음날 (음력 8월 14일, 15일, 16일)\n `\n\n 상\n 전체 보험회사 공시이율의 평균으로, 이 계약 체결 시점의 10. 12월 25일(기독탄신일) 해\n 평균공시이율\n 이율을 말합니다. 10의2. 「공직선거법」제34조에 따른 임기만료에 의한 선거의 선거일\n보장부분 적용이율 보장보험료를 산출할 때, 적용하는 이율을 말합니다. 11. 기타 정부에서 수시 지정하는 날\n\n 계약이 해지되는 때에 회사가 계약자에게 돌려주는 금액을 제3조(대체공휴일)\n 해약환급금\n 말합니다. 질\n ① 제2조제2호부터 제10호까지의 공휴일이 다음 각 호의 어느 하나에 해당\n 병\n 기간과 날짜 관련 용어 하는 경우에는 그 공휴일 다음의 첫 번째 비공휴일(제2조 각 호의 공휴일이\n 아닌 날을 말한다. 이하 같다)을 대체공휴일로 한다.\n 용어 정의 1. 제2조제2호 또는 제7호의 공휴일이 토요일이나 일요일과 겹치는 경우\n 보험기간 계약에 따라 보장을 받는 기간을 말"}, {"id": "c85", "name": "반려동물의료비Ⅴ", "sub": "슬관절·고관절탈구 포함 (1년 이후)", "text": "2 반려동물 의료비Ⅴ(슬관절/고관절탈구포함(1년이후)) 보상 한도 자기부담금\n (실손) 특별약관 질\n 수술을 하지 않은 날의 경우 1일당 10만원 병\n1. (보험금의 지급사유) 보험증권에 기재된\n 회사는 이 특별약관의 보험기간 중 보장개시일(책임개시일) 이후에 보험증권에 기 수술당일에 한하여 1일당 자기부담금\n 재된 반려동물에게 상해 또는 질병(이하 “사고”라 합니다)이 발생하여 그 치료를 수술을 한 날의 경우 1일당 200만원\n 상\n 직접적인 목적으로 국내에서 수의사에게 치료를 받은 때에는 1일당 피보험자가\n 해\n 부담한 반려동물 치료에 사용된 비용(각종 할인 및 감면, 사후환급금액 등을 제외 및\n 한 실수납액을 의미합니다. 이하 「의료비」라 합니다)을 이 약관에 따라 피보험자 질\n 에게 의료비보험금으로 보상하여 드립니다. 다만, 연간 지급하는 총 보험금은 보 【연간 총 보상한도액 2,000만원 의료비의 경우】 병\n 험증권에 기재된 연간 총 보상한도액을 한도로 합니다.\n 지급\n 위 의 반려동물이라 함은 대한민국 내에서 피보험자와 거주를 함께하며, 사육․ 수술 여부\n 관리하는 개(犬)를 말합니다. 보상 한도 자기부담금\n 위 에도 불구하고 보장개시일로(책임개시일)부터 그 날을 포함하여 30일 이내 비\n 에 발생한 질병은 보상하지 않습니다. 단, 『[제6장 반려동물의료비관련] 1.반려동 1일당 15만원 / 용\n 수술을 하지 않은 날의 경우\n 물 의료비Ⅴ(실손) 특별약관』 29.(특별약관의 재가입) 및 에 따라 재가입하 30만원 중 보험증권에\n 는 경우 또는 『[제6장 반려동물의료비관련] 1.반려동물 의료비Ⅴ(실손) 특별약 기재된 일당 보상한도\n 관』 29.(특별약관의 재가입) 에 따라 특별약관이 연장된 경우에는 적용하지 않 보험증권에 기재된\n 습니다. 1일당 자기부담금\n 수술당일에 한하여 반\n 위 에도 불구하고 보장개시일로(책임개시일)부터 그 날을 포함하여 1년 이내에 수술을 한 날의 경우 1일당 250만원 려\n 발생한 슬관절탈구, 고관절탈구, 슬관절형성부전, 고관절형성부전 또는 기타 이들 동\n 과 유사한 질병 또는 상해는 보상하지 않습니다. 단, 『[제6장 반려동물의료비관 물\n 련] 1.반려동물 의료비Ⅴ(실손) 특별약관』 29.(특별약관의 재가입) 및 에 따\n 라 재가입하는 경우 또는 『[제6장 반려동물의료비관련] 1.반려동물 의료비Ⅴ(실\n 손) 특별약관』 29.(특별약관의 재가입) 에 따라 특별약관이 연장된 경우에는 적 반\n 려\n 동\n 물\n 135 의\n 료\n 비\n\f☞ 목차로 돌아가기\n\n <지급보험금의 계산 > 위하여 수의사법 제17조(개설)에서 규정한 국내의 동물병원에서 수의사의 관리\n[(피보험자가 부담한 의료비 – 적용 자기부담금) × 보상비율]과 일당 보상한도 하에 직접적인 치료를 목적으로 기구를 사용하여 생체에 절단, 절제 등의 조작을\n중 작은 금액 가하는 것을 말합니다. 단, 수술에서 아래에 정한 사항은 제외합니다.\n ① 흡인(吸引)\n <예시안내>\n ② 천자(穿刺) 등의 조치\n𐤟 일 보상한도액 : 15만원, 보상비율 70%, 자기부담금 3만원 기준\n ③ 미용성형 목적의 수술\n(예시1)\n ④ 검사 및 진단을 위한 수술(생검(生檢), 복강경검사(腹腔鏡檢査) 등)\n– 피보험자가 부담한 당일 의료비 23만원, 수술하지 않은 경우\n– 보험금 지급금액\n 절단\n= [(23만원 – 3만원) × 70%]과 15만원 중 적은 금액\n 용어 특정부위를 잘라 내는 것\n= 14만원\n 풀이 절제\n(예시2) 특정부위를 잘라 없애는 것\n– 피보험자가 부담한 당일 의료비 103만원, 수술한 경우 흡인\n– 보험금 지급금액 주사기 등으로 빨아들이는 것\n= [(103만원 – 3만원) × 70%]과 250만원 중 적은 금액 천자\n= 70만원 바늘 또는 관을 꽂아 체액·조직을 뽑아내거나 약물을 주입하는 것\n 반려동물이 1.(보험금의 지급사유) 의 사고로 치료를 받던 중에 보험기간이 만\n 료된 경우에도 만료일부터 180일이내의 의료비는 보상하여 드립니다. 다만 사고 4. (보험금을 지급하지 않는 사유)\n 일 또는 발병일부터 365일이내의 치료인 경"}  말합니다.\n 보험금 분담 계약(공제계약을 포함합니다)이 있을 경우 비율에 따라 손해를\n 보험금 지급사유가 발생하는 때에 회사에 보험금을 청구하여 보상합니다.\n 보험수익자\n 받을 수 있는 사람을 말합니다.\n 계약의 성립과 그 내용을 증명하기 위하여 회사가 계약자에게 부가설명 음식물\n 보험증권\n 드리는 증서를 말합니다.\n 반려동물이 일상 생활 중 보호자 또는 생산자의 의도와 상관 없이 섭취할 수 있는\n 계약을 체결하기 위하여 피보험자가 건강진단을 받아야 하는 모든 식이 원료와 가공품 및 부산물(뼈, 과일 씨 등 폐기 대상물질)을 말하며, 사람\n 진단계약\n 계약을 말합니다. 및 다른 동물의 식이로 활용될 수 있는 모든 것을 포함합니다. 또한 음식물의\n 반려동물의 소유와 관련하여 보험사고로 손해를 입은 상태(부패, 감염 여부 등)와 상관없이 모두 포함됩니다.\n 피보험자 사람(법인인 경우에는 그 이사 또는 법인의 업무를 집행하는 그\n 밖의 기관)을 말합니다.\n\n 82\n\f☞ 목차로 돌아가기 무배당 프로미라이프 펫블리 반려묘보험2604\n 특\n 지급금과 이자율 관련 용어 별\n 3. 1월 1일 약\n 용어 정의 4. 설날 전날, 설날, 설날 다음날 (음력 12월 말일, 1월 1일, 2일) 관\n 5. 삭제 <2005. 6. 30>\n 회사가 지급할 금전에 이자를 줄 때 1년마다 마지막 날에 그 6. 부처님오신날 (음력 4월 8일)\n 연단위 복리 이자를 원금에 더한 금액을 다음 1년의 원금으로 하는 이자 7. 5월 5일 (어린이날)\n 계산방법을 말합니다.\n 8. 6월 6일 (현충일)\n 상\n `\n\n 전체 보험회사 공시이율의 평균으로, 이 계약 체결 시점의 9. 추석 전날, 추석, 추석 다음날 (음력 8월 14일, 15일, 16일) 해\n 평균공시이율\n 이율을 말합니다. 10. 12월 25일(기독탄신일)\n보장부분 적용이율 보장보험료를 산출할 때, 적용하는 이율을 말합니다. 10의2. 「공직선거법」제34조에 따른 임기만료에 의한 선거의 선거일\n 11. 기타 정부에서 수시 지정하는 날\n 계약이 해지되는 때에 회사가 계약자에게 돌려주는 금액을\n 해약환급금\n 말합니다. 제3조(대체공휴일) 질\n ① 제2조제2호부터 제10호까지의 공휴일이 다음 각 호의 어느 하나에 병\n 기간과 날짜 관련 용어\n 해당하는 경우에는 그 공휴일 다음의 첫 번째 비공휴일(제2조 각 호의\n 용어 정의 공휴일이 아닌 날을 말한다. 이하 같다)을 대체공휴일로 한다.\n 보험기간 계약에 따라 보장을 받는 기간을 말합니다. 1. 제2조제2호 또는 제7호의 공휴일이"}, {"id": "c95", "name": "반려동물장례지원비Ⅱ", "sub": "실손 지급·고양이", "text": "2 반려동물 장례지원비Ⅱ(고양이)(실손)(갱신형) 특별약관 약\n 회사는 보험가입 후 갱신계약에 대하여 가입시점의 약관을 적용하며(단, 법령 및\n 관\n 금융위원회의 명령, 제도적인 약관개정에 따라 약관이 변경된 경우에는 변경된\n 약관 적용합니다), 보험요율에 관한 제도 또는 보험료를 개정한 경우 이 특별약관\n 에 대해서는 갱신일 현재의 제도 또는 보험료를 적용합니다. 1. (보험금의 지급사유)\n 회사는 이 특별약관의 보험기간이 끝나기 15일 전까지 해당 계약자가 납입하여야\n 회사는 「이 계약의 보험기간」 중 보장개시일(책임개시일) 이후에 보험증권에 기재\n 하는 갱신계약 보험료를 서면, 전화(음성녹음) 또는 전자문서 등으로 안내합니다. 상\n 된 반려동물이 보험기간 중에 사망한 경우 농림축산식품부령에 정하는 바에 따라\n 의 법령 및 금융위원회의 명령, 제도적인 약관개정에 따라 약관이 변경되어 보 해\n 허가를 받은 동물장묘업체(이하 ‘장묘업체’라 합니다.)에서 반려동물 장례 중 발생\n 장내용이 변경된 경우에는 이 특별약관의 보험기간이 끝나기 15일 전까지 그 변 한 장례비용(각종 할인 및 감면, 사후환급금액 등을 제외한 실수납액을 의미합니\n 경내용, 계약자의 자동갱신 의사를 확인하는 내용 등을 서면(등기우편 등), 전화 다)에 대해 보험증권에 기재된 한도로 보상하여 드립니다.\n (음성녹음), 전자문서, 휴대전화 문자메시지 또는 이에 준하는 전자적 의사표시 등 위 의 장례비용은 장묘업체에서 정의하는 기준장례비용에 무게에 따른 추가\n 으로 2회 이상 안내하여 드립니다. 장례비용(화장비용 등)을 더한 금액에 70%를 곱한 비용을 말합니다.\n 회사는 의 계약자의 자동갱신 의사를 전화(음성녹음), 직접 방문 또는 전자적 위 의 기준장례비용이란 반려동물 장례 중 기본적으로 발생하는 염습, 추모예 질\n 의사표시(통신판매계약의 경우 통신수단)를 통해 확인하고, 자동갱신 의사가 확인 식, 화장 및 기준장례용품(기본유골함, 보자기, 기본 국화, 기본 나무관, 기본 수 병\n 되는 경우 갱신일에 이 특별약관은 갱신일 현재의 약관 등으로 갱신됩니다. 다만, 의에 한합니다.)에 대한 장례비용(최소 무게 기준)을 말하며 최대 50만원한도로\n 합니다. 단, 기능성유골함, 고급수의(보), 추모보석 제작, 고급 케이스, 고급 특수\n 계약자가 자동갱신을 원하지 않는 경우에는 갱신일에 이 특별약관은 만료됩니다.\n 관, 꽃다발, 리무진이용, 산골, 납골당 등 기준장례용품 외 추가비용이 발생하는\n 회사가 의 계약자의 자동갱신 의사를 확인하지 못한 경우(계약자와 연락두절 항목들은 기준장례비용에서 제외합니다. 상\n 등으로 회사 안내가 계약자에게 도달하지 못한 경우 포함)에는 갱신일에 이 특별 위 의 반려동물이라 함은 대한민국 내에서 피보험자와 거주를 함께하며, 사육․ 해\n 약관은 갱신일 현재의 약관 등으로 갱신됩니다. 다만, 계약자는 갱신일 현재의 약 관리하는 묘(貓)를 말합니다. 및\n 관 등에 대해 갱신일로부터 90일 이내에 그 계약을 취소할 수 있으며, 이 경우 질\n 위 에서 보장개시일(책임개시일)이라 함은 다음과 같습니다. 병\n 회사는 계약자에게 갱신일 이후 납입한 이 특별약관의 보험료를 돌려 드립니다.\n 구분 보장개시일(책임개시일)\n30. (준용규정) 보험계약일로부터 그 날을 포함하여 30일이 지난날의\n 갱신형(최초계약)의 경우\n이 특별약관에서 정하지 않은 사항은 보통약관을 따릅니다. 단, 이 특별약관에서는 다음날 비\n보통약관 [제1절 공통조항]에서 정한 9.(만기환급금의 지급)의 만기환급금 및 37.(중 용\n도인출금)의 중도인출금은 지급하지 않으며, 보통약관 [제1절 공통조항] 24.(계약의 갱신형(갱신계약)의 경우 이 계약의 갱신일\n소멸) 및 12.(보험수익자의 지정)은 적용하지 않습니다.\n\n 반\n 려\n 동\n 물\n\n 반\n 려\n 동\n 93 물\n 의\n 료\n 비\n\f☞ 목차로 돌아가기\n\n ① 계약자, 피보험자, 이들의 가족 또는 사용인의 고의 또는 중대한 과실\n 동물보호법 제69조(영업의 허가)\n ② 보험계약일로부터 그 날을 포함하여 30일 이내에 발생한 손"}, {"id": "c96", "name": "반려동물양육자금Ⅰ", "sub": "반려인 상해 사망시·강아지", "text": "반려동물 양육자금Ⅰ(상해사망시) 특별약관 4. (준용규정)\n 1\n 이 특별약관에 정하지 않은 사항은 보통약관 [제1절 공통조항]을 따릅니다. 단, 이\n 특별약관에서는 보통약관 [제1절 공통조항]에서 정한 9.(만기환급금의 지급)의 만기환\n 급금 및 37.(중도인출금)의 중도인출금은 지급하지 않습니다.\n1. (보험금의 지급사유)\n회사는 보험증권에 기재된 피보험자가 이 특별약관의 보험기간 중에 상해의 직접결과\n로써 사망한 경우 이 특별약관의 보험가입금액을 반려동물 양육자금Ⅰ으로 지급합니\n다. 2 상해후유장해(3~100%) 특별약관\n\n2. (보험금 지급에 관한 세부규정)\n 1.(보험금의 지급사유)의 ‘사망’에는 보험기간에 다음 어느 하나의 사유가 발생한 1. (보험금의 지급사유)\n 경우를 포함합니다. 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」중에 상해로 「장해분\n ① 실종선고를 받은 경우: 법원에서 인정한 실종기간이 끝나는 때에 사망한 것으 류표」(【별표2】장해분류표 참조. 이하 같습니다)에서 정한 장해지급률이 3~100%에\n 로 봅니다. 해당하는 장해상태가 되었을 때 장해분류표에서 정한 지급률을 이 특별약관의 보험가\n ② 관공서에서 수해, 화재나 그 밖의 재난을 조사하고 사망한 것으로 통보하는 입금액에 곱하여 산출한 금액을 상해후유장해(3~100%)보험금으로 지급합니다.\n 경우: 가족관계등록부에 기재된 사망연월일을 기준으로 합니다.\n 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료 결정에 관한 법률」에 따 2. (보험금 지급에 관한 세부규정)\n 른 연명의료 중단 등 결정 및 그 이행으로 피보험자가 사망하는 경우 연명의료중\n 1.(보험금의 지급사유)에서 장해지급률이 상해 발생일로부터 180일 이내에 확정\n 단 등 결정 및 그 이행은 1.(보험금의 지급사유) ‘사망’의 원인 및 ‘사망보험금’ 지\n 되지 않는 경우에는 상해 발생일부터 180일이 되는 날의 의사 진단에 기초하여\n 급에 영향을 미치지 않습니다.\n 고정될 것으로 인정되는 상태를 장해지급률로 결정합니다. 다만, 장해분류표(【별표\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n 2】장해분류표 참조. 이하 같습니다)에 장해판정시기를 별도로 정한 경우에는 그에\n 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수\n 따릅니다.\n\n 58\n\f☞ 목차로 돌아가기 무배당 프로미라이프 펫블리 반려견보험2604\n 특\n 위 에 따라 장해지급률이 결정되었으나 그 이후 보장받을 수 있는 기간(계약의 별\n 효력이 없어진 경우에는 보험기간이 10년 이상인 계약은 상해 발생일로부터 2년 보험금 지급 예시 - 1 약\n 이내로 하고, 보험기간이 10년 미만인 계약은 상해 발생일로부터 1년 이내)에 장 관\n 예시\n 해상태가 더 악화된 때에는 그 악화된 장해상태를 기준으로 장해지급률을 결정합\n 니다. 보험가입 전 보험가입일 보험가입 후\n 장해분류표에 해당되지 않는 후유장해는 피보험자의 직업, 나이, 신분 또는 성별 한 팔의 손목관절에 상해로 그 손목관절에\n 등에 관계없이 신체의 장해정도에 따라 장해분류표의 구분에 준하여 지급액을 결 심한 장해(지급률20%) 기능을 완전히 잃은 상\n 정합니다. 다만, 장해분류표의 각 장해분류별 최저 지급률 장해정도에 이르지 않 상태 경우(지급률 30%) 해\n 는 후유장해에 대하여는 후유장해보험금을 지급하지 않습니다.\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금 지급사유에 대해 합의하지\n 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 → 상해로 인한 장해지급률 30%에서 보험가입 전 발생한 장해지급률 20%\n 있습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에 를 차감한 10%(=30%-20%)에 해당하는 후유장해보험금을 지급\n 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다.\n 같은 상해로 두 가지 이상의 후유장해가 생긴 경우에는 후유장해 지급률을 더하 질\n 보험금 지급 예시 -"}, {"id": "c97", "name": "반려동물양육자금Ⅱ", "sub": "반려인 질병 사망시·강아지", "text": "반려동물 양육자금Ⅱ(질병사망시) 특별약관 해지)의 규정을 따릅니다.\n 1\n 4. (준용규정)\n 이 특별약관에 정하지 않은 사항은 보통약관 [제1절 공통조항]을 따릅니다. 단, 이\n1. (보험금의 지급사유) 특별약관에서는 보통약관 [제1절 공통조항]에서 정한 9.(만기환급금의 지급)의 만기환\n회사는 보험증권에 기재된 피보험자가 이 특별약관의 보험기간 중에 질병으로 인하여 급금 및 37.(중도인출금)의 중도인출금은 지급하지 않으며, 15.(계약 후 알릴 의무)는\n사망하였을 경우 다음과 같이 반려동물 양육자금Ⅱ로 지급합니다. 적용하지 않습니다.\n\n 구분 경과기간 지급금액\n\n 2 반려동물 위탁비용(반려인질병입원1일이상30일한도)\n 보험계약일로부터 1년 미만 이 특별약관 보험가입금액의 50%\n 반려동물 (실손)(갱신형) 특별약관\n 양육자금Ⅱ\n 보험계약일로부터 1년 이상 이 특별약관 보험가입금액의 100% 1. (보험금의 지급사유)\n 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」중에 진단확정된\n 질병으로 인해 「병원 또는 의원」(한방병원 또는 한의원을 포함합니다)에 1일 이상\n2. (보험금 지급에 관한 세부규정) 계속 입원하여 치료를 받은 때에는 입원기간 동안 보험증권에 기재된 반려동물을\n 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료 결정에 관한 법률」에 따 동물위탁관리업체(이하 ‘수탁기관’이라 합니다.)에 위탁함으로써 발생한 위탁비용\n 른 연명의료 중단 등 결정 및 그 이행으로 피보험자가 사망하는 경우 연명의료 (각종 할인 및 감면, 사후환급금액 등을 제외한 실수납액을 의미합니다)에 대해\n 중단 등 결정 및 그 이행은 1.(보험금의 지급사유) ‘사망’의 원인 및 ‘사망보험금’ 아래 반려견 구분에 따라 위탁 1일당 보험증권에 기재된 한도로 보상하여 드립니\n 지급에 영향을 미치지 않습니다. 다. 단, 반려견 구분은 견종별 평균 무게에 따라 회사가 정한 바에 따릅니다.\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n\n 72\n\f☞ 목차로 돌아가기 무배당 프로미라이프 펫블리 반려견보험2604\n 특\n 2. (보험금 지급에 관한 세부규정) 별\n 반려견 구분 보상한도 약\n 1.(보험금의 지급사유)의 위탁비용의 지급일수는 피보험자의 1회 입원당 30일을\n 소형견 5만원 관\n 한도로 합니다.\n 동일한 질병의 치료를 목적으로 보험기간 중에 2회 이상 입원한 경우(동일한 질\n 중형견 5만원\n 병의 치료를 직접 목적으로 병원 또는 의원을 이전하여 입원한 경우를 포함)에는\n (초)대형견 7만원 이를 1회 입원으로 보아 각 입원일수를 합산하여 상기 을 적용합니다.\n 상기 에도 불구하고 동일한 질병에 대한 입원이라도 위탁비용이 지급된 입원의 상\n 위 의 “수탁기관”이라 함은 동물보호법 시행규칙 제43조(등록영업의 세부 범위) 최종입원의 퇴원일로부터 180일이 경과하여 개시한 입원은 새로운 입원으로 봅 해\n 에서 정하는 동물위탁관리업자로써, 반려동물 소유자의 위탁을 받아 반려동물을 니다. 다만 아래와 같이 위탁비용이 지급된 입원의 최종입원일로부터 180일이 경\n 영업장 내에서 일시적으로 사육, 훈련 또는 보호하는 영업을 행하는 시설을 말합 과하도록 퇴원없이 계속 입원중인 경우에는 위탁비용이 지급된 입원의 최종입원\n 니다. 일의 그 다음날을 퇴원일로 봅니다.\n 위 의 반려동물이라 함은 대한민국 내에서 피보험자와 거주를 함께하며, 사육․\n 관리하는 개(犬)를 말합니다. 최초 위탁비용이 지급된 질\n 보장재개\n 보험 입원일 입원의 최종입원일 병\n 동물보호법 제73조 제1항(영업의 등록) 지식\n 퇴원없이 계속 입원 …\n인용 동물과 관련된 다음 각 호의 영업을 하려는 자는 농림축산식품부령으로 정하\n문구 위탁비용지급(20일)\n 는 바에 따라 특별자치시장·특별자치도지사·시장·군수·구청장에게 등록하여야\n (위탁시설 상\n 한다. 20일이용) 해\n 2. 동물전시업 2. 동물위탁관리업 3. 동물미용업 4. 동물운송업 및\n 위탁비용 보장 보장제외 위탁비용 보장 질\n … 병\n 동물보호법 시행규칙 제43조(등록영업의"}, {"id": "c98", "name": "반려동물양육자금Ⅰ", "sub": "반려인 상해 사망시·고양이", "text": "반려동물 양육자금Ⅰ(상해사망시) 특별약관 4. (준용규정)\n 1\n 이 특별약관에 정하지 않은 사항은 보통약관 [제1절 공통조항]을 따릅니다. 단, 이\n 특별약관에서는 보통약관 [제1절 공통조항]에서 정한 9.(만기환급금의 지급)의 만기환\n 급금 및 37.(중도인출금)의 중도인출금은 지급하지 않습니다.\n1. (보험금의 지급사유)\n회사는 보험증권에 기재된 피보험자가 이 특별약관의 보험기간 중에 상해의 직접결과\n로써 사망한 경우 이 특별약관의 보험가입금액을 반려동물 양육자금Ⅰ으로 지급합니\n다.\n 2 상해후유장해(3~100%) 특별약관\n2. (보험금 지급에 관한 세부규정)\n 1.(보험금의 지급사유)의 ‘사망’에는 보험기간에 다음 어느 하나의 사유가 발생한\n 경우를 포함합니다. 1. (보험금의 지급사유)\n ① 실종선고를 받은 경우: 법원에서 인정한 실종기간이 끝나는 때에 사망한 것으 회사는 보험증권에 기재된 피보험자가 「이 특별약관의 보험기간」중에 상해로 「장해분\n 로 봅니다. 류표」(【별표2】장해분류표 참조. 이하 같습니다)에서 정한 장해지급률이 3~100%에\n ② 관공서에서 수해, 화재나 그 밖의 재난을 조사하고 사망한 것으로 통보하는 해당하는 장해상태가 되었을 때 장해분류표에서 정한 지급률을 이 특별약관의 보험가\n 경우: 가족관계등록부에 기재된 사망연월일을 기준으로 합니다. 입금액에 곱하여 산출한 금액을 상해후유장해(3~100%)보험금으로 지급합니다.\n 「호스피스·완화의료 및 임종과정에 있는 환자의 연명의료 결정에 관한 법률」에 따\n 른 연명의료 중단 등 결정 및 그 이행으로 피보험자가 사망하는 경우 연명의료중 2. (보험금 지급에 관한 세부규정)\n 단 등 결정 및 그 이행은 1.(보험금의 지급사유) ‘사망’의 원인 및 ‘사망보험금’ 지\n 1.(보험금의 지급사유)에서 장해지급률이 상해 발생일로부터 180일 이내에 확정\n 급에 영향을 미치지 않습니다.\n 되지 않는 경우에는 상해 발생일부터 180일이 되는 날의 의사 진단에 기초하여\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금의 지급사유에 대해 합의하지\n 고정될 것으로 인정되는 상태를 장해지급률로 결정합니다. 다만, 장해분류표(【별표\n 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수\n 2】장해분류표 참조. 이하 같습니다)에 장해판정시기를 별도로 정한 경우에는 그에\n\n 60\n\f☞ 목차로 돌아가기 무배당 프로미라이프 펫블리 반려묘보험2604\n 특\n 따릅니다. 별\n 위 에 따라 장해지급률이 결정되었으나 그 이후 보장받을 수 있는 기간(계약의 보험금 지급 예시 - 1 약\n 효력이 없어진 경우에는 보험기간이 10년 이상인 계약은 상해 발생일로부터 2년 관\n 예시\n 이내로 하고, 보험기간이 10년 미만인 계약은 상해 발생일로부터 1년 이내)에 장\n 해상태가 더 악화된 때에는 그 악화된 장해상태를 기준으로 장해지급률을 결정합 보험가입 전 보험가입일 보험가입 후\n 니다. 한 팔의 손목관절에 상해로 그 손목관절에\n 장해분류표에 해당되지 않는 후유장해는 피보험자의 직업, 나이, 신분 또는 성별 심한 장해(지급률20%) 기능을 완전히 잃은\n 등에 관계없이 신체의 장해정도에 따라 장해분류표의 구분에 준하여 지급액을 결 상\n 상태 경우(지급률 30%) 해\n 정합니다. 다만, 장해분류표의 각 장해분류별 최저 지급률 장해정도에 이르지 않\n 는 후유장해에 대하여는 후유장해보험금을 지급하지 않습니다.\n 보험수익자와 회사가 1.(보험금의 지급사유)의 보험금 지급사유에 대해 합의하지 → 상해로 인한 장해지급률 30%에서 보험가입 전 발생한 장해지급률 20%\n 못할 때는 보험수익자와 회사가 함께 제3자를 정하고 그 제3자의 의견에 따를 수 를 차감한 10%(=30%-20%)에 해당하는 후유장해보험금을 지급\n 있습니다. 제3자는 의료법 제3조(의료기관)에 규정한 종합병원 소속 전문의 중에\n 정하며, 보험금 지급사유 판정에 드는 의료비용은 회사가 전액 부담합니다. 보험금 지급 예시 - 2 질\n 같은 상해로 두 가지 이상의 후유장해가 생긴 경우에는 후유장해 지급률을 더"}, {"id": "c99", "name": "반려동물양육자금Ⅱ", "sub": "반려인 질병 사망시·고양이", "text": "반려동물 양육자금Ⅱ(질병사망시) 특별약관 해지)의 규정을 따릅니다.\n 1\n 4. (준용규정)\n 이 특별약관에 정하지 않은 사항은 보통약관 [제1절 공통조항]을 따릅니다. 단, 이\n1. (보험금의 지급사유) 특별약관에서는 보통약관 [제1절 공통조항]에서 정한 9 【첫 번째 담보 약관】
${textA}

【두 번째 담보 약관】
${textB}

⚠️ 필수 규칙: "담보 A" "담보 B" 라는 표현은 절대 쓰지 마세요.
반드시 실제 담보명을 **굵게** 표기하세요.
- 첫 번째 → **${nameA}**
- 두 번째 → **${nameB}**

다음 구조로 작성해주세요:

## 핵심 차이 한 줄 요약
## 보장 범위 차이
## 지급 조건·횟수 차이
## 어떤 고객에게 어느 담보가 적합한가
## 설계사 주의사항`
      }]
    })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

function Md({ text }) {
  const blocks = text.split(/\n{2,}/);
  return (
    <div style={{ fontSize: 13.5, color: "#1F2937" }}>
      {blocks.map((block, bi) => {
        const lines = block.split("\n");
        const first = lines[0];
        if (first.startsWith("## ")) {
          return (
            <div key={bi} style={{ marginTop: bi === 0 ? 0 : 22, marginBottom: 10 }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#1E3A8A", paddingBottom: 6, borderBottom: "2px solid #DBEAFE", display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ color: "#3B82F6", fontSize: 11 }}>◆</span>{first.slice(3)}
              </div>
              <div style={{ marginTop: 8, lineHeight: 1.9 }}>
                {lines.slice(1).map((l, li) => renderLine(l, `${bi}-${li}`))}
              </div>
            </div>
          );
        }
        return (
          <div key={bi} style={{ lineHeight: 1.9, marginBottom: 8 }}>
            {lines.map((l, li) => renderLine(l, `${bi}-${li}`))}
          </div>
        );
      })}
    </div>
  );
}

function renderLine(line, key) {
  if (!line.trim()) return <div key={key} style={{ height: 6 }} />;
  const parts = line.split(/(\*\*.*?\*\*)/g);
  return (
    <div key={key} style={{ marginBottom: 2 }}>
      {parts.map((p, i) =>
        p.startsWith("**") && p.endsWith("**")
          ? <strong key={i} style={{ color: "#111827", fontWeight: 700 }}>{p.slice(2, -2)}</strong>
          : p
      )}
    </div>
  );
}

const ALL_COVERAGES = GROUPS.flatMap(g =>
  g.coverages.map(c => ({ ...c, groupLabel: g.label, groupIcon: g.icon, category: g.category, groupId: g.id }))
);

function App() {
  const [group, setGroup] = useState(GROUPS[0]);
  const [selA, setSelA] = useState(null);
  const [selB, setSelB] = useState(null);
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const resultRef = useRef(null);
  const [searchQ, setSearchQ] = useState("");
  const [searchOpen, setSearchOpen] = useState(false);

  const cc = CAT_COLOR[group.category] || "#374151";

  const searchResults = searchQ.trim().length > 0
    ? ALL_COVERAGES.filter(c =>
        (c.name + c.sub + c.groupLabel).replace(/\s/g,"").includes(searchQ.replace(/\s/g,""))
      ).slice(0, 30)
    : [];

  const pickFromSearch = (cov) => {
    setSearchQ(""); setSearchOpen(false);
    const g = GROUPS.find(g => g.id === cov.groupId);
    if (g) setGroup(g);
    if (!selA) { setSelA(cov); return; }
    if (selA.id === cov.id) return;
    if (!selB) { setSelB(cov); return; }
    setSelB(cov);
  };

  const pickCard = (cov) => {
    if (!selA) { setSelA(cov); return; }
    if (selA.id === cov.id) { setSelA(selB); setSelB(null); setResult(""); return; }
    if (!selB) { setSelB(cov); return; }
    if (selB.id === cov.id) { setSelB(null); setResult(""); return; }
    setSelA(cov); setSelB(null); setResult(""); setError("");
  };

  const switchGroup = (g) => {
    setGroup(g); setSelA(null); setSelB(null); setResult(""); setError("");
  };

  const compare = async () => {
    if (!selA || !selB) return;
    setLoading(true); setError(""); setResult("");
    try {
      const txt = await compareWithClaude(selA, selB);
      setResult(txt);
      setTimeout(() => resultRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const cats = {};
  CAT_ORDER.forEach(c => { cats[c] = []; });
  GROUPS.forEach(g => { if (cats[g.category]) cats[g.category].push(g); });

  return (
    <div style={{ fontFamily: "\'Apple SD Gothic Neo\',\'Noto Sans KR\',sans-serif", minHeight: "100vh", background: "#F1F5F9" }}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      <div style={{ background: "linear-gradient(135deg,#0F172A,#1E3A8A)", padding: "12px 18px", display: "flex", alignItems: "center", gap: 10, position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 10px rgba(0,0,0,.4)", flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          <div style={{ color: "#F8FAFC", fontWeight: 700, fontSize: 14 }}>📋 담보 비교 분석기</div>
          <div style={{ color: "#64748B", fontSize: 10 }}>DB손보 프로미라이프 · 106개 담보</div>
        </div>
        <div style={{ flex: 1, minWidth: 200, maxWidth: 380, position: "relative" }}>
          <div style={{ display: "flex", alignItems: "center", background: "rgba(255,255,255,.12)", border: "1.5px solid rgba(255,255,255,.2)", borderRadius: 9, padding: "6px 12px", gap: 8 }}>
            <span style={{ fontSize: 14 }}>🔍</span>
            <input type="text" placeholder="담보명 검색 (한 글자도 OK)..." value={searchQ}
              onChange={e => { setSearchQ(e.target.value); setSearchOpen(true); }}
              onFocus={() => setSearchOpen(true)}
              onBlur={() => setTimeout(() => setSearchOpen(false), 150)}
              style={{ flex: 1, background: "none", border: "none", outline: "none", color: "#F8FAFC", fontSize: 13, fontFamily: "inherit" }} />
            {searchQ && <button onClick={() => { setSearchQ(""); setSearchOpen(false); }} style={{ background: "none", border: "none", color: "#94A3B8", cursor: "pointer", fontSize: 14, padding: 0 }}>✕</button>}
          </div>
          {searchOpen && searchResults.length > 0 && (
            <div style={{ position: "absolute", top: "calc(100% + 6px)", left: 0, right: 0, background: "#FFF", borderRadius: 10, boxShadow: "0 8px 30px rgba(0,0,0,.25)", zIndex: 200, maxHeight: 380, overflowY: "auto", border: "1.5px solid #E5E7EB" }}>
              <div style={{ padding: "8px 12px", fontSize: 10.5, color: "#9CA3AF", fontWeight: 600, borderBottom: "1px solid #F3F4F6" }}>{searchResults.length}개 검색됨</div>
              {searchResults.map((c, i) => {
                const isA = selA?.id === c.id, isB = selB?.id === c.id;
                return (
                  <div key={c.id} onMouseDown={() => pickFromSearch(c)} style={{ padding: "9px 12px", cursor: "pointer", borderBottom: i < searchResults.length - 1 ? "1px solid #F3F4F6" : "none", background: isA ? "#EFF6FF" : isB ? "#FFF0F0" : "#FFF", display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 12 }}>{c.groupIcon}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 12.5, color: "#111827" }}>{c.name}</div>
                      <div style={{ fontSize: 11, color: "#6B7280" }}>{c.sub}</div>
                    </div>
                    {(isA || isB) && <span style={{ width: 18, height: 18, borderRadius: "50%", background: isA ? "#3B82F6" : "#EF4444", color: "#FFF", fontSize: 10, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{isA ? "A" : "B"}</span>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div style={{ background: "rgba(34,197,94,.15)", border: "1px solid rgba(34,197,94,.4)", color: "#86EFAC", borderRadius: 9999, padding: "3px 9px", fontSize: 10, fontWeight: 700 }}>v3.1</div>
      </div>

      <div style={{ maxWidth: 940, margin: "0 auto", padding: "14px 12px" }}>
        <div style={{ background: "#FFF", borderRadius: 12, padding: "14px 16px", marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,.06)" }}>
          <div style={{ fontSize: 13, color: "#374151" }}>가나다</div>
        </div>
        <div style={{ background: "#FFF", borderRadius: 12, padding: "14px 16px", marginBottom: 12, boxShadow: "0 1px 4px rgba(0,0,0,.06)" }}>
          <div style={{ fontSize: 10, color: "#9CA3AF", fontWeight: 600, marginBottom: 10 }}>📂 담보 유형 선택</div>
          {CAT_ORDER.map(cat => {
            const gs = cats[cat] || [];
            if (!gs.length) return null;
            const cc2 = CAT_COLOR[cat] || "#374151";
            return (
              <div key={cat} style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 9.5, color: cc2, fontWeight: 700, marginBottom: 5 }}>{cat.toUpperCase()}</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                  {gs.map(g => {
                    const isActive = group.id === g.id;
                    return (
                      <button key={g.id} onClick={() => switchGroup(g)} style={{ background: isActive ? cc2 : "#F8FAFC", color: isActive ? "#FFF" : "#374151", border: isActive ? `2px solid ${cc2}` : "1.5px solid #E5E7EB", borderRadius: 8, padding: "5px 11px", fontSize: 12, fontWeight: isActive ? 700 : 500, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                        {g.icon} {g.label}
                        <span style={{ background: isActive ? "rgba(255,255,255,.25)" : "#E5E7EB", color: isActive ? "#FFF" : "#6B7280", borderRadius: 9999, padding: "0 5px", fontSize: 9.5, fontWeight: 700 }}>{g.coverages.length}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ background: "#FFF", border: "1.5px solid #E5E7EB", borderRadius: 10, padding: "10px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          {[["A", selA, "#1D4ED8", "#DBEAFE"], ["B", selB, "#DC2626", "#FEE2E2"]].map(([lbl, sel, tc, bg]) => (
            <div key={lbl} style={{ display: "flex", alignItems: "center", gap: 7, flex: 1, minWidth: 0 }}>
              <div style={{ background: bg, color: tc, borderRadius: 6, padding: "2px 7px", fontSize: 10, fontWeight: 700, flexShrink: 0 }}>{lbl}</div>
              <div style={{ fontWeight: 600, fontSize: 13, color: sel ? "#111827" : "#D1D5DB", lineHeight: 1.3 }}>
                {sel ? <>{sel.name}<br /><span style={{ fontWeight: 400, fontSize: 11, color: "#6B7280" }}>{sel.sub}</span></> : "담보를 선택하세요"}
              </div>
            </div>
          ))}
          <span style={{ color: "#CBD5E1", fontSize: 18 }}>vs</span>
          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
            {(selA || selB) && <button onClick={() => { setSelA(null); setSelB(null); setResult(""); setError(""); }} style={{ background: "none", border: "1.5px solid #E5E7EB", borderRadius: 7, padding: "7px 12px", fontSize: 12, color: "#6B7280", cursor: "pointer" }}>초기화</button>}
            <button onClick={compare} disabled={!selA || !selB || loading} style={{ background: (!selA || !selB || loading) ? "#E5E7EB" : `linear-gradient(135deg,${cc},${cc}CC)`, color: (!selA || !selB || loading) ? "#9CA3AF" : "#FFF", border: "none", borderRadius: 7, padding: "8px 18px", fontSize: 13, fontWeight: 700, cursor: (!selA || !selB || loading) ? "default" : "pointer", display: "flex", alignItems: "center", gap: 6 }}>
              {loading ? <><span style={{ width: 13, height: 13, border: "2px solid #D1D5DB", borderTopColor: "#6B7280", borderRadius: "50%", display: "inline-block", animation: "spin .8s linear infinite" }} />분석 중</> : "🔍 비교분석"}
            </button>
          </div>
        </div>

        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: "#6B7280", marginBottom: 8 }}>
            <strong style={{ color: "#1E3A8A" }}>2개 클릭</strong> 후 비교분석 — {group.label} 총 {group.coverages.length}개
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 7 }}>
            {group.coverages.map(cov => {
              const isA = selA?.id === cov.id, isB = selB?.id === cov.id, isSel = isA || isB;
              const isDisabled = selA && selB && !isSel;
              return (
                <div key={cov.id} onClick={() => !isDisabled && pickCard(cov)} style={{ background: isA ? "#EFF6FF" : isB ? "#FFF0F0" : "#FFF", border: isA ? "2px solid #3B82F6" : isB ? "2px solid #EF4444" : "1.5px solid #E5E7EB", borderRadius: 10, padding: "11px 12px", cursor: isDisabled ? "not-allowed" : "pointer", opacity: isDisabled ? .4 : 1, position: "relative" }}>
                  {isSel && <div style={{ position: "absolute", top: 8, right: 8, width: 19, height: 19, borderRadius: "50%", background: isA ? "#3B82F6" : "#EF4444", color: "#FFF", fontSize: 10, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{isA ? "A" : "B"}</div>}
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#111827", paddingRight: isSel ? 24 : 0, lineHeight: 1.3 }}>{cov.name}</div>
                  <div style={{ marginTop: 5, display: "inline-block", background: isA ? "#DBEAFE" : isB ? "#FEE2E2" : "#F3F4F6", color: isA ? "#1D4ED8" : isB ? "#DC2626" : "#4B5563", borderRadius: 5, padding: "2px 7px", fontSize: 10.5, fontWeight: 600 }}>{cov.sub}</div>
                </div>
              );
            })}
          </div>
        </div>

        {(result || error || loading) && (
          <div ref={resultRef} style={{ background: "#FFF", border: "1.5px solid #E5E7EB", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,.07)" }}>
            <div style={{ background: "linear-gradient(135deg,#0F172A,#1E3A8A)", padding: "10px 16px", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ background: "#3B82F6", color: "#FFF", borderRadius: 6, padding: "2px 8px", fontSize: 10, fontWeight: 700 }}>AI 분석</span>
              <span style={{ background: "#1E40AF", color: "#BFDBFE", borderRadius: 6, padding: "3px 9px", fontSize: 11.5, fontWeight: 700 }}>A. {selA?.name} ({selA?.sub})</span>
              <span style={{ color: "#475569", fontSize: 10 }}>vs</span>
              <span style={{ background: "#991B1B", color: "#FECACA", borderRadius: 6, padding: "3px 9px", fontSize: 11.5, fontWeight: 700 }}>B. {selB?.name} ({selB?.sub})</span>
            </div>
            <div style={{ padding: "22px 24px" }}>
              {loading && <div style={{ display: "flex", alignItems: "center", gap: 10, color: "#6B7280", fontSize: 13 }}><span style={{ width: 16, height: 16, border: "2px solid #DBEAFE", borderTopColor: "#1D4ED8", borderRadius: "50%", display: "inline-block", animation: "spin .8s linear infinite" }} />약관을 읽고 분석 중입니다...</div>}
              {error && <div style={{ background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 8, padding: "12px 16px", color: "#B91C1C", fontSize: 13 }}>⚠️ {error}</div>}
              {result && <Md text={result} />}
              {result && <div style={{ marginTop: 20, padding: "8px 12px", background: "#F8FAFC", borderRadius: 6, fontSize: 10.5, color: "#94A3B8" }}>※ AI 분석은 약관 원문 기반입니다. 정확한 내용은 반드시 원문을 확인하세요.</div>}
            </div>
          </div>
        )}

        {!result && !loading && !error && (
          <div style={{ textAlign: "center", padding: "28px", color: "#94A3B8", fontSize: 13, lineHeight: 2 }}>
            위에서 카테고리를 선택하고<br />
            <strong style={{ color: "#3B82F6" }}>담보 카드 2개를 클릭</strong>한 다음<br />
            <strong style={{ color: "#3B82F6" }}>🔍 비교분석</strong> 버튼을 눌러보세요
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
